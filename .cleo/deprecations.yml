# CLEO Deprecation Registry
#
# Each entry MUST be unique by `id` and carry:
#   - path(s) — source file(s) bearing the @deprecated TSDoc
#   - since   — release version where deprecation landed
#   - remove  — earliest release version that may drop the code
#   - replacement — concrete migration command/symbol
#   - note    — short justification + ADR/task reference
#
# Validated by scripts/lint-deprecations.mjs against
# .cleo/deprecations.schema.json. The lint also asserts every TSDoc
# `@deprecated` in the listed paths has a corresponding registry entry.
#
# @task T9795
# @saga T9787
version: 1
deprecations:
  # T9784 / Saga T9782 — RIP-OUT (no deprecation, no soft-removal):
  #   - `changelog-writer-custom-log`        → deleted source: packages/core/src/release/changelog-writer.ts (T9784-B)
  #   - `ui-changelog-label-grouping`        → deleted source: packages/core/src/ui/changelog.ts             (T9784-B)
  #   - `generate-changelog-renderer`        → deleted source: packages/cleo/src/cli/commands/generate-changelog.ts (T9784-B)
  #   - `cleo-release-changelog-verb-git-log` → engine-op + verb deleted in T9784-A (#414)
  # Per the "single canonical CHANGELOG system" directive, the four
  # competing renderers/writers/verbs were ripped out wholesale instead of
  # being deprecated. The canonical write surface is `cleo changeset add`
  # (T9793); the canonical aggregator is `aggregateChangesetsForRelease`
  # in `packages/core/src/release/changesets-aggregator.ts`.

  - id: agent-output-raw-md-write
    path: packages/core/src/tools/adr-backfill-walker.ts
    since: v2026.5.93
    remove: v2026.6.0
    replacement: cleo docs add --type note
    note: >-
      Raw `.md` writes to `.cleo/agent-outputs/` bypass the docs registry
      SSoT. Migrate to `cleo docs add --type note` (T9788).

  # T9879 / Saga T9855 — legacy directory-resolver wrappers superseded by the
  # SSoT template registry from T9877. Each wrapper now delegates internally
  # to `getTemplatesByKind(...)` + `resolveSourcePathAbsolute(...)`; the
  # wrappers stay as thin shims through the deprecation window so out-of-tree
  # consumers retain a migration runway. Removal target v2026.7.0.
  - id: get-cleo-templates-dir
    path: packages/core/src/paths.ts
    since: v2026.5.112
    remove: v2026.7.0
    replacement: join(getCleoHome(), getTemplateById('cleo-injection').installPath)
    note: >-
      Directory accessor returns `{cleoHome}/templates`. Compose the install
      path via the SSoT registry entry instead (T9877). See ADR-076.

  - id: get-workflow-templates-dir
    paths:
      - packages/core/src/init/scaffold-workflows.ts
      - packages/cleo/src/cli/commands/init.ts
    since: v2026.5.112
    remove: v2026.7.0
    replacement: getTemplatesByKind('workflow') + resolveSourcePathAbsolute(entry)
    note: >-
      Directory accessor used by `cleo init --workflows` / `cleo upgrade
      workflows`. Wrapper now delegates to the SSoT registry (T9877). See
      ADR-076 / Saga T9855.

  - id: resolve-agent-templates
    path: packages/core/src/agents/resolveAgentTemplates.ts
    since: v2026.5.112
    remove: v2026.7.0
    replacement: getTemplatesByKind('agent') + resolveSourcePathAbsolute(entry)
    note: >-
      Directory accessor used by the agent seed installer. Wrapper now
      delegates to the SSoT registry (T9877). ADR-076 / Saga T9855.

  - id: resolve-starter-bundle
    path: packages/core/src/agents/resolveAgentTemplates.ts
    since: v2026.5.112
    remove: v2026.7.0
    replacement: resolveAgentTemplates() (itself SSoT-backed post T9879)
    note: >-
      Back-compat alias for the pre-ADR-068 starter-bundle terminology. The
      delegate (`resolveAgentTemplates`) is itself deprecated — migrate to
      the registry directly. Saga T9855.

  # T9888 / Saga T9855 — `cleo init --workflows` CLI alias is now a thin
  # wrapper around the SSoT template registry. The branch emits a
  # deprecation warning to stderr and delegates through
  # `getTemplatesByKind('workflow')` + `scaffoldWorkflows`. The canonical
  # install surface going forward is `cleo templates install --kind
  # workflow` (T9886). Removal target v2026.7.0.
  - id: cleo-init-workflows-alias
    path: packages/cleo/src/cli/commands/init.ts
    since: v2026.5.115
    remove: v2026.7.0
    replacement: cleo templates install --kind workflow
    note: >-
      Legacy `cleo init --workflows` CLI alias. The canonical workflow
      install surface is `cleo templates install --kind workflow` (T9886).
      The alias now emits a deprecation warning and delegates through the
      SSoT template registry. Saga T9855 / ADR-076 / T9888.
