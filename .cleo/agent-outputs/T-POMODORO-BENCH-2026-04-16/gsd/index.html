<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A focused Todo + Pomodoro timer. Client-side, private, fast.">
  <title>Todo + Pomodoro</title>
  <!-- Apply theme BEFORE paint to avoid flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("pomodoro.theme");
        if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = t;
      } catch (e) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">GSD + Pomodoro Todo</h1>
    <div class="header-actions">
      <button id="theme-toggle" type="button" aria-label="Toggle theme">
        <span aria-hidden="true" class="theme-icon">🌓</span>
      </button>
      <button id="settings-open" type="button" aria-label="Open settings">
        <span aria-hidden="true">⚙</span>
      </button>
    </div>
  </header>

  <main class="app-main">
    <!-- Todos -->
    <section class="todos-section" aria-labelledby="todos-heading">
      <h2 id="todos-heading">Todos</h2>

      <form id="new-todo-form" class="new-todo-form" autocomplete="off">
        <label class="visually-hidden" for="new-todo-input">New todo</label>
        <input
          id="new-todo-input"
          name="text"
          type="text"
          placeholder="What will you focus on? (N)"
          aria-label="New todo text"
          maxlength="200"
          required>
        <button type="submit" aria-label="Add todo">Add</button>
      </form>

      <ul id="todo-list" class="todo-list" role="list" aria-live="polite"></ul>

      <p id="todos-empty" class="todos-empty" hidden>No todos yet. Press <kbd>N</kbd> to add one.</p>
    </section>

    <!-- Timer -->
    <section class="timer-section" aria-labelledby="timer-heading">
      <h2 id="timer-heading">Timer</h2>

      <div class="timer-wrap" role="timer" aria-live="polite" aria-atomic="true">
        <svg class="ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-track" cx="100" cy="100" r="90"/>
          <circle class="ring-progress" cx="100" cy="100" r="90"
                  stroke-dasharray="565.487" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-center">
          <div id="timer-phase" class="timer-phase">Idle</div>
          <div id="timer-display" class="timer-display">25:00</div>
          <div id="timer-for" class="timer-for">Select a todo to begin</div>
        </div>
      </div>

      <div class="timer-controls">
        <button id="timer-start" type="button" aria-label="Start or pause timer (Space)" disabled>
          Start
        </button>
        <button id="timer-reset" type="button" aria-label="Reset current phase">
          Reset
        </button>
      </div>

      <dl class="counters">
        <div>
          <dt>Selected</dt>
          <dd id="selected-count">0</dd>
        </div>
        <div>
          <dt>Today</dt>
          <dd id="daily-count">0</dd>
        </div>
        <div>
          <dt>Cycle</dt>
          <dd id="cycle-count">0</dd>
        </div>
      </dl>
    </section>
  </main>

  <footer class="app-footer">
    <small>Tip: <kbd>Space</kbd> start/pause · <kbd>N</kbd> new · <kbd>Enter</kbd> edit · <kbd>Delete</kbd> remove</small>
  </footer>

  <!-- Settings dialog -->
  <dialog id="settings-dialog" aria-labelledby="settings-heading">
    <form method="dialog" id="settings-form">
      <h2 id="settings-heading">Settings</h2>
      <label>
        Work (min)
        <input type="number" id="settings-work" min="1" max="120" step="1" required>
      </label>
      <label>
        Short break (min)
        <input type="number" id="settings-short" min="1" max="60" step="1" required>
      </label>
      <label>
        Long break (min)
        <input type="number" id="settings-long" min="1" max="120" step="1" required>
      </label>
      <menu class="dialog-actions">
        <button type="submit" value="save" aria-label="Save settings">Save</button>
        <button type="button" id="settings-cancel" aria-label="Cancel settings">Cancel</button>
      </menu>
    </form>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
