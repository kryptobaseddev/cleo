# @task T10434
name: Auto-Tag on Release Merge (retired)

# Retired by T10434 / ADR-087.
#
# This workflow used to tag release-ship merge commits and push `v*`, expecting
# the tag push to trigger `.github/workflows/release.yml`. That was a two-hop
# GitHub Actions chain created with `GITHUB_TOKEN`; pushes made by GITHUB_TOKEN
# do not reliably trigger downstream workflows. The supported release path is
# now explicit: merge the release prepare PR, then create/push the signed release
# tag (or manually dispatch release.yml against an existing tag). `release.yml`
# itself builds the worktree-napi prebuild matrix before publishing.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retired:
    name: Retired no-op
    runs-on: ubuntu-latest
    steps:
      - name: Explain retired release flow
        run: |
          set -euo pipefail
          echo "auto-tag-on-release-merge.yml is retired (T10434 / ADR-087)."
          echo "Merge the release prepare PR, then push the release tag explicitly."
