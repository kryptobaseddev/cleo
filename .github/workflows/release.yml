name: Release

# Triggers:
#   1. Automatic: push a v* tag (e.g. v2026.3.14, v2026.3.14-beta.1)
#   2. Manual break-glass: workflow_dispatch with a version input
#      (use if the tag push triggered a failed run that needs a retry)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2026.3.14). Tag must already exist on main.'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # Resolve version from tag push or manual workflow_dispatch input
      - name: Get version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          # Determine npm dist-tag from version suffix
          if [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-dev"* ]]; then
            DIST_TAG="dev"
          elif [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
            DIST_TAG="beta"
          else
            DIST_TAG="latest"
          fi
          IS_PRERELEASE=$([[ "$VERSION" == *"-"* ]] && echo "true" || echo "false")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION | dist-tag: $DIST_TAG | prerelease: $IS_PRERELEASE"

      # CalVer validation: YYYY.M.PATCH (stable) or YYYY.M.PATCH-suffix (pre-release)
      - name: Validate CalVer
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BASE_VERSION="${VERSION%%-*}"
          TAG_YEAR="${BASE_VERSION%%.*}"
          TAG_MONTH="${BASE_VERSION#*.}"; TAG_MONTH="${TAG_MONTH%%.*}"
          CURRENT_YEAR=$(date -u +%Y)
          CURRENT_MONTH=$(date -u +%-m)
          NEXT_MONTH=$(( CURRENT_MONTH == 12 ? 1 : CURRENT_MONTH + 1 ))
          NEXT_YEAR=$(( CURRENT_MONTH == 12 ? CURRENT_YEAR + 1 : CURRENT_YEAR ))

          if [[ "$VERSION" == *"-"* ]]; then
            # Pre-release: allow current or next month
            if [[ "$TAG_YEAR" != "$CURRENT_YEAR" && "$TAG_YEAR" != "$NEXT_YEAR" ]] || \
               [[ "$TAG_MONTH" != "$CURRENT_MONTH" && "$TAG_MONTH" != "$NEXT_MONTH" ]]; then
              echo "ERROR: Pre-release $VERSION outside allowed CalVer range"
              exit 1
            fi
            echo "CalVer OK (pre-release): $VERSION"
          else
            # Stable: strict current month required
            if [[ "$TAG_YEAR" != "$CURRENT_YEAR" || "$TAG_MONTH" != "$CURRENT_MONTH" ]]; then
              echo "ERROR: $VERSION does not match current CalVer ${CURRENT_YEAR}.${CURRENT_MONTH}"
              exit 1
            fi
            echo "CalVer OK (stable): $VERSION"
          fi

      # Sync all package.json versions from the tag.
      #
      # The git tag is the canonical source of truth for the release version.
      # The root package.json AND every publishable workspace package.json are
      # synced from the tag in the same step so they cannot drift.
      #
      # Prevents "cannot publish over previously published" errors when a
      # developer forgets to bump package.json files before pushing the tag,
      # and prevents the root package.json from lying about the workspace
      # version (which it did from v2026.4.5 through v2026.4.8).
      - name: Sync package versions from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Root first — root package.json is the workspace source of truth.
          if [[ -f "package.json" ]]; then
            jq --arg v "$VERSION" '.version = $v' "package.json" > "package.tmp" \
              && mv "package.tmp" "package.json"
            echo "package.json (root) synced to $VERSION"
          fi
          # Then every publishable workspace package.
          for pkg in packages/contracts packages/core packages/caamp packages/lafs packages/cant packages/nexus packages/runtime packages/adapters packages/cleo packages/cleo-os packages/agents packages/skills; do
            if [[ -f "$pkg/package.json" ]]; then
              jq --arg v "$VERSION" '.version = $v' "$pkg/package.json" > "$pkg/package.tmp" \
                && mv "$pkg/package.tmp" "$pkg/package.json"
              echo "$pkg/package.json version synced to $VERSION"
            fi
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Wipe all dist directories before building to prevent stale incremental
      # tsbuildinfo cache from producing incomplete tarballs (T721 / T633).
      # Without this, `tsc --composite` reuses cached .d.ts-only outputs when
      # the pnpm node_modules cache is restored but the dist tree is partial.
      - name: Clean dist (prevent stale cache)
        run: |
          pnpm -r exec -- sh -c 'rm -rf dist' 2>/dev/null || true
          echo "All dist directories wiped"

      - name: Build
        run: pnpm run build

      # Hard gate: verify critical .js files are present in the @cleocode/core
      # tarball before any publish step runs. Catches the regression pattern
      # where tsc incremental compilation emits only .d.ts outputs. (T721)
      - name: Verify @cleocode/core tarball contents
        run: |
          cd packages/core
          npm pack --dry-run > /tmp/core-pack-list.txt 2>&1
          REQUIRED_FILES=(
            "dist/store/nexus-sqlite.js"
            "dist/store/brain-sqlite.js"
            "dist/index.js"
            "dist/internal.js"
          )
          MISSING=()
          for file in "${REQUIRED_FILES[@]}"; do
            if ! grep -qF "$file" /tmp/core-pack-list.txt; then
              MISSING+=("$file")
            fi
          done
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "::error::@cleocode/core tarball is missing required JS files:"
            for f in "${MISSING[@]}"; do echo "  MISSING: $f"; done
            echo "--- Full pack contents (dist/store section) ---"
            grep "dist/store" /tmp/core-pack-list.txt || true
            exit 1
          fi
          echo "✅ @cleocode/core tarball verification passed"

      - name: Validate build output
        run: |
          declare -a required_artifacts=(
            "packages/contracts/dist/index.js"
            "packages/caamp/dist/index.js"
            "packages/lafs/dist/src/index.js"
            "packages/cant/dist/index.js"
            "packages/nexus/dist/src/index.js"
            "packages/runtime/dist/index.js"
            "packages/core/dist/index.js"
            "packages/cleo/dist/cli/index.js"
            "packages/cleo-os/dist/cli.js"
          )
          for path in "${required_artifacts[@]}"; do
            [[ -e "$path" ]] || { echo "ERROR: Missing required artifact: $path"; exit 1; }
          done
          # adapters build is best-effort (may not have a dist if type-only)
          [[ -e "packages/adapters/dist/index.js" ]] \
            && echo "packages/adapters/dist/index.js present" \
            || echo "WARN: packages/adapters/dist/index.js missing (skipping — may be type-only)"
          echo "All required build artifacts present"

      # ── CHANGELOG gate ────────────────────────────────────────────────────────

      - name: Verify CHANGELOG section
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain a section for version ${VERSION}"
            echo "Expected to find: ## [${VERSION}]"
            echo "Add a CHANGELOG section locally before pushing the tag."
            exit 1
          fi
          echo "CHANGELOG section verified for v${VERSION}"

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Build release tarball and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          STAGING="staging/cleocode-${VERSION}"
          mkdir -p "$STAGING"

          # Root metadata
          cp LICENSE README.md CHANGELOG.md "$STAGING/"

          # Core package (standalone business logic kernel)
          mkdir -p "$STAGING/packages/core"
          cp -r packages/core/dist packages/core/package.json "$STAGING/packages/core/"
          for extra in migrations schemas templates; do
            [[ -d "packages/core/$extra" ]] \
              && cp -r "packages/core/$extra" "$STAGING/packages/core/" || true
          done

          # Contracts package (type-only interfaces)
          mkdir -p "$STAGING/packages/contracts"
          cp -r packages/contracts/dist packages/contracts/package.json "$STAGING/packages/contracts/"

          # LAFS package
          mkdir -p "$STAGING/packages/lafs"
          cp -r packages/lafs/dist packages/lafs/package.json "$STAGING/packages/lafs/"
          for extra in schemas lafs.md README.md LICENSE; do
            [[ -e "packages/lafs/$extra" ]] && cp -r "packages/lafs/$extra" "$STAGING/packages/lafs/" || true
          done

          # CAAMP package
          mkdir -p "$STAGING/packages/caamp"
          cp -r packages/caamp/dist packages/caamp/package.json "$STAGING/packages/caamp/"
          for extra in providers README.md LICENSE; do
            [[ -e "packages/caamp/$extra" ]] && cp -r "packages/caamp/$extra" "$STAGING/packages/caamp/" || true
          done

          # CANT package
          if [[ -d packages/cant/dist ]]; then
            mkdir -p "$STAGING/packages/cant"
            cp -r packages/cant/dist packages/cant/package.json "$STAGING/packages/cant/"
            for extra in wasm README.md LICENSE; do
              [[ -e "packages/cant/$extra" ]] && cp -r "packages/cant/$extra" "$STAGING/packages/cant/" || true
            done
          fi

          # Runtime package
          if [[ -d packages/runtime/dist ]]; then
            mkdir -p "$STAGING/packages/runtime"
            cp -r packages/runtime/dist packages/runtime/package.json "$STAGING/packages/runtime/"
            for extra in README.md LICENSE; do
              [[ -e "packages/runtime/$extra" ]] && cp -r "packages/runtime/$extra" "$STAGING/packages/runtime/" || true
            done
          fi

          # Adapters package
          if [[ -d packages/adapters/dist ]]; then
            mkdir -p "$STAGING/packages/adapters"
            cp -r packages/adapters/dist packages/adapters/package.json "$STAGING/packages/adapters/"
          fi

          # Skills package (data)
          if [[ -d packages/skills/skills ]]; then
            mkdir -p "$STAGING/packages/skills"
            cp -r packages/skills/skills packages/skills/package.json "$STAGING/packages/skills/"
            for f in packages/skills/*.json packages/skills/*.js packages/skills/*.d.ts; do
              [[ -f "$f" ]] && cp "$f" "$STAGING/packages/skills/" || true
            done
          fi

          # Agents package (templates)
          if [[ -d packages/agents ]]; then
            mkdir -p "$STAGING/packages/agents"
            cp -r packages/agents/* "$STAGING/packages/agents/" 2>/dev/null || true
          fi

          # CLI/MCP package (the assembled product)
          mkdir -p "$STAGING/packages/cleo"
          cp -r packages/cleo/dist packages/cleo/package.json "$STAGING/packages/cleo/"
          for extra in schemas migrations templates completions bin; do
            [[ -d "packages/cleo/$extra" ]] \
              && cp -r "packages/cleo/$extra" "$STAGING/packages/cleo/" || true
          done

          # Make executables runnable
          chmod +x "$STAGING/packages/cleo/dist/cli/index.js" \
                   "$STAGING/packages/cleo/dist/mcp/index.js" 2>/dev/null || true

          tar -czf "cleocode-${VERSION}.tar.gz" -C staging "cleocode-${VERSION}"

          # ── Separate cleo-os TUI bundle ───────────────────────────────────────
          # cleo-os is the TUI release that wraps the cleo CLI + Pi systems.
          # Shipped as its own tarball so consumers can fetch the TUI without
          # pulling the full monorepo snapshot.
          CLEOOS_STAGING="staging/cleoos-${VERSION}"
          mkdir -p "$CLEOOS_STAGING"
          cp LICENSE README.md CHANGELOG.md "$CLEOOS_STAGING/"
          mkdir -p "$CLEOOS_STAGING/packages/cleo-os"
          cp -r packages/cleo-os/dist \
                packages/cleo-os/package.json \
                "$CLEOOS_STAGING/packages/cleo-os/"
          for extra in extensions bin README.md LICENSE; do
            [[ -e "packages/cleo-os/$extra" ]] \
              && cp -r "packages/cleo-os/$extra" "$CLEOOS_STAGING/packages/cleo-os/" || true
          done
          chmod +x "$CLEOOS_STAGING/packages/cleo-os/dist/cli.js" 2>/dev/null || true
          tar -czf "cleoos-${VERSION}.tar.gz" -C staging "cleoos-${VERSION}"

          # Combined checksums for both tarballs
          sha256sum "cleocode-${VERSION}.tar.gz" "cleoos-${VERSION}.tar.gz" > SHA256SUMS
          echo "cleocode tarball size: $(ls -lh "cleocode-${VERSION}.tar.gz" | awk '{print $5}')"
          echo "cleoos   tarball size: $(ls -lh "cleoos-${VERSION}.tar.gz" | awk '{print $5}')"
          cat SHA256SUMS

      - name: Generate release notes from CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.txt
            echo "Source: CHANGELOG.md"
          else
            echo "### Changes" > release-notes.txt
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [[ -n "$PREV_TAG" ]]; then
              git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD" >> release-notes.txt
            else
              git log --pretty=format:"- %s" --no-merges -20 >> release-notes.txt
            fi
            echo "Source: git log"
          fi
          cat release-notes.txt

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          # Delete any existing release for this tag (keeps the tag itself).
          # This makes the step idempotent — safe to re-run on workflow retries.
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          PRERELEASE_FLAG=""
          [[ "$IS_PRERELEASE" == "true" ]] && PRERELEASE_FLAG="--prerelease"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-notes.txt \
            $PRERELEASE_FLAG \
            "cleocode-${VERSION}.tar.gz" \
            "cleoos-${VERSION}.tar.gz" \
            SHA256SUMS
          echo "GitHub release v${VERSION} published"

      # ── npm Publish (OIDC Trusted Publishing) ─────────────────────────────────
      # Publish in dependency order so downstream packages can resolve workspace:*
      # refs correctly when pnpm replaces them with real version numbers.

      # npm Trusted Publishing via OIDC — no NPM_TOKEN secret needed.
      # Requires: each @cleocode/* package on npmjs.com configured with
      # GitHub Actions trusted publishing (Settings → Publishing access).
      - name: Publish packages to npm
        env:
          TAG: ${{ steps.version.outputs.dist_tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PUBLISH_ARGS="--tag $TAG --access public --no-git-checks --provenance"
          FAILED_PKGS=()

          # Returns 0 if @cleocode/$1@$VERSION is already on npm (idempotent re-runs).
          # Uses explicit @VERSION qualifier so the check is correct regardless of
          # which dist-tag (latest/beta/dev) was used and regardless of npm registry
          # cache state for the "latest" pointer.
          already_published() {
            local pkg="$1"
            local published_version
            published_version=$(npm view "@cleocode/$pkg@$VERSION" version 2>/dev/null || true)
            [[ "$published_version" == "$VERSION" ]]
          }

          publish_pkg() {
            local pkg="$1"
            echo "--- Publishing @cleocode/$pkg ---"
            if [[ ! -d "packages/$pkg" ]]; then
              echo "SKIP: packages/$pkg does not exist"
              return 0
            fi
            if [[ "$pkg" == "adapters" ]] && [[ ! -d "packages/$pkg/dist" ]]; then
              echo "SKIP: no dist (may be type-only)"
              return 0
            fi
            if already_published "$pkg"; then
              echo "✓ SKIP: @cleocode/$pkg@$VERSION already on npm (idempotent re-run)"
              return 0
            fi
            pushd "packages/$pkg" > /dev/null
            PUBLISH_OUTPUT=$(pnpm publish $PUBLISH_ARGS 2>&1)
            PUBLISH_EXIT=$?
            echo "$PUBLISH_OUTPUT"
            if [[ $PUBLISH_EXIT -eq 0 ]]; then
              echo "✓ PUBLISHED: @cleocode/$pkg@$VERSION"
            else
              # Re-check after failure: distinguish between version-conflict 403
              # (already published — safe to skip) vs real OIDC/permission errors.
              if already_published "$pkg"; then
                echo "✓ SKIP-RACE: @cleocode/$pkg@$VERSION was published concurrently or pre-exists"
              elif echo "$PUBLISH_OUTPUT" | grep -qi "cannot publish over the previously published"; then
                # 403 "cannot publish over" — version exists but registry cache missed our pre-check
                echo "✓ SKIP-CONFLICT: @cleocode/$pkg@$VERSION already published (403 version conflict)"
              elif echo "$PUBLISH_OUTPUT" | grep -qi "OIDC\|trusted publish\|403\|401\|Unauthorized\|Forbidden"; then
                echo "✗ FAIL: @cleocode/$pkg publish failed — possible OIDC/permission error"
                echo "  Error detail: $(echo "$PUBLISH_OUTPUT" | grep -i 'OIDC\|403\|401\|error\|npm ERR' | head -5)"
                FAILED_PKGS+=("$pkg")
              else
                echo "✗ FAIL: @cleocode/$pkg publish failed"
                FAILED_PKGS+=("$pkg")
              fi
            fi
            popd > /dev/null
          }

          # Publish in dependency order:
          #   contracts → lafs → core → caamp/cant → runtime → adapters → agents → skills → cleo → cleo-os
          # cleo-os depends on cleo + cant (workspace:*), so it must publish LAST.
          publish_pkg contracts
          publish_pkg lafs
          publish_pkg core
          publish_pkg caamp
          publish_pkg cant
          publish_pkg nexus
          publish_pkg runtime
          publish_pkg adapters
          publish_pkg agents
          publish_pkg skills
          publish_pkg cleo
          publish_pkg cleo-os

          if [[ ${#FAILED_PKGS[@]} -gt 0 ]]; then
            echo "::error::Real publish failures for: ${FAILED_PKGS[*]}"
            echo ""
            echo "Diagnosis guide:"
            echo "  If error mentions OIDC / 401 / Unauthorized:"
            echo "    → npm Trusted Publisher not configured or misconfigured"
            echo "    → Fix: npmjs.com → package → Settings → Publishing access"
            echo "         → Add GitHub Actions trusted publisher (org=kryptobaseddev,"
            echo "           repo=cleo, workflow=.github/workflows/release.yml)"
            echo ""
            echo "  If error mentions 403 / permission denied (not 'cannot publish over'):"
            echo "    → Package may be private or missing publishConfig.access=public"
            echo ""
            echo "  If error mentions 'cannot publish over previously published':"
            echo "    → Version conflict: this version already exists on npm"
            echo "    → This should have been caught as SKIP — check already_published() logic"
            echo ""
            echo "  NOTE: 403 'cannot publish over' is NOT an OIDC failure."
            echo "        OIDC trusted publisher IS working if any packages published successfully."
            exit 1
          fi
          echo "✓ All packages published or skipped (idempotent re-run safe)"
