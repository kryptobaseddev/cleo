name: Arch Boundary Check

# @task T10072
# Inventoried in docs/release/workflow-inventory.md (T10102).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-open-guard:
    name: DB Open Guard (T10073)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run lint-no-direct-db-open (baseline mode)
        run: node scripts/lint-no-direct-db-open.mjs

  define-command-ssot:
    # T10072 · Epic T9837 · Saga T9831 SG-ARCH-SOLID
    #
    # Enforces that `defineCommand` from 'citty' is only imported through the
    # canonical SSoT wrapper (packages/cleo/src/cli/lib/define-cli-command.ts).
    # Runs in --check (baseline) mode: fails only when NEW violations are added
    # above the committed baseline count. Existing debt is tracked but not
    # blocked — it will be swept in follow-up tasks under Epic T9837.
    #
    # To update the baseline after a migration wave:
    #   node scripts/lint-no-raw-define-command.mjs --baseline
    #   git add .cleo/define-command-ssot-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Architectural Boundary Check (SG-ARCH-SOLID)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint defineCommand SSoT boundary
        run: node scripts/lint-no-raw-define-command.mjs --check

  stdout-discipline:
    # T10135 · Epic T10114 (E11-HUMAN-RENDER-CONTRACT) · Saga T9855 · ADR-077
    #
    # Enforces that `process.stdout.write` is only called from the canonical
    # render SSoT (`packages/core/src/render/**`), the animations primitives
    # (`packages/animations/**`), the cleo animation bridge + thin dispatcher,
    # the top-level CLI entry, scripts, and test files.
    #
    # Runs in baseline mode: fails only when NEW violation identities appear
    # vs the committed baseline (scripts/.lint-stdout-discipline-baseline.json).
    # Existing pre-B6/B7/B8 debt is tracked but not blocked.
    #
    # To update the baseline after migrating a callsite to the render SSoT:
    #   node scripts/lint-stdout-discipline.mjs --update-baseline
    #   git add scripts/.lint-stdout-discipline-baseline.json && git commit
    name: Stdout Discipline Lint (T10135)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint stdout discipline (baseline mode)
        run: node scripts/lint-stdout-discipline.mjs

  stdout-write-allowlist:
    # T9924 · Saga T9855 (E8.5) · ADR-077
    #
    # Strict companion to `stdout-discipline` (T10135). The T10135 gate
    # path-allowlists entire directories (scripts/, animations/, cleo-os/,
    # cli/index.ts, etc.); T9924 requires an EXPLICIT per-line opt-out
    # comment (`// stdout-write-allowed: <reason>`) for any
    # `process.stdout.write` call outside the renderer SSoT paths:
    #   - packages/cleo/src/cli/renderers/**
    #   - packages/core/src/render/**
    #
    # Runs in --check (baseline) mode: fails only when NEW unannotated
    # violation identities appear vs the committed baseline
    # (scripts/.lint-stdout-write-allowlist-baseline.json). Existing
    # call sites are pinned by the baseline; new authors must either move
    # their call into the renderer SSoT or annotate the line.
    #
    # To update the baseline after annotating/migrating call sites:
    #   node scripts/lint-stdout-write-allowlist.mjs --update-baseline
    #   git add scripts/.lint-stdout-write-allowlist-baseline.json && git commit
    name: Stdout Write Allowlist Lint (T9924)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint stdout-write allowlist (check mode)
        run: node scripts/lint-stdout-write-allowlist.mjs --check
