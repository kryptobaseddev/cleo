name: Arch Boundary Check

# @task T10072
# Inventoried in docs/release/workflow-inventory.md (T10102).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-open-guard:
    name: DB Open Guard (T10073)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run lint-no-direct-db-open (strict mode — T11529 · E6-L9)
        run: node scripts/lint-no-direct-db-open.mjs --strict

      - name: Run lint-node-engine-ssot (T11281)
        run: node scripts/lint-node-engine-ssot.mjs

  define-command-ssot:
    # T10072 · Epic T9837 · Saga T9831 SG-ARCH-SOLID
    #
    # Enforces that `defineCommand` from 'citty' is only imported through the
    # canonical SSoT wrapper (packages/cleo/src/cli/lib/define-cli-command.ts).
    # Runs in --check (baseline) mode: fails only when NEW violations are added
    # above the committed baseline count. Existing debt is tracked but not
    # blocked — it will be swept in follow-up tasks under Epic T9837.
    #
    # To update the baseline after a migration wave:
    #   node scripts/lint-no-raw-define-command.mjs --baseline
    #   git add .cleo/define-command-ssot-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Architectural Boundary Check (SG-ARCH-SOLID)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint defineCommand SSoT boundary
        run: node scripts/lint-no-raw-define-command.mjs --check

  stdout-discipline:
    # T10135 · Epic T10114 (E11-HUMAN-RENDER-CONTRACT) · Saga T9855 · ADR-077
    #
    # Enforces that `process.stdout.write` is only called from the canonical
    # render SSoT (`packages/core/src/render/**`), the animations primitives
    # (`packages/animations/**`), the cleo animation bridge + thin dispatcher,
    # the top-level CLI entry, scripts, and test files.
    #
    # Runs in baseline mode: fails only when NEW violation identities appear
    # vs the committed baseline (scripts/.lint-stdout-discipline-baseline.json).
    # Existing pre-B6/B7/B8 debt is tracked but not blocked.
    #
    # To update the baseline after migrating a callsite to the render SSoT:
    #   node scripts/lint-stdout-discipline.mjs --update-baseline
    #   git add scripts/.lint-stdout-discipline-baseline.json && git commit
    name: Stdout Discipline Lint (T10135)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint stdout discipline (baseline mode)
        run: node scripts/lint-stdout-discipline.mjs

  stdout-write-allowlist:
    # T9924 · Saga T9855 (E8.5) · ADR-077
    #
    # Strict companion to `stdout-discipline` (T10135). The T10135 gate
    # path-allowlists entire directories (scripts/, animations/, cleo-os/,
    # cli/index.ts, etc.); T9924 requires an EXPLICIT per-line opt-out
    # comment (`// stdout-write-allowed: <reason>`) for any
    # `process.stdout.write` call outside the renderer SSoT paths:
    #   - packages/cleo/src/cli/renderers/**
    #   - packages/core/src/render/**
    #
    # Runs in --check (baseline) mode: fails only when NEW unannotated
    # violation identities appear vs the committed baseline
    # (scripts/.lint-stdout-write-allowlist-baseline.json). Existing
    # call sites are pinned by the baseline; new authors must either move
    # their call into the renderer SSoT or annotate the line.
    #
    # To update the baseline after annotating/migrating call sites:
    #   node scripts/lint-stdout-write-allowlist.mjs --update-baseline
    #   git add scripts/.lint-stdout-write-allowlist-baseline.json && git commit
    name: Stdout Write Allowlist Lint (T9924)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint stdout-write allowlist (check mode)
        run: node scripts/lint-stdout-write-allowlist.mjs --check

  publish-surface:
    # T11400 · Epic T11388 (E1) · Saga T11387 SG-PACKAGE-ARCH
    #
    # Locks the npm publish surface (the `publish_pkg` list in
    # .github/workflows/release.yml) against silent growth and re-introduction
    # of dead artifacts. Asserts: exact entry count (EXPECTED_PUBLISH_COUNT,
    # currently 18 post-E1, trending to the owner's single-artifact target of
    # 1 via R8/R10); every entry is a public, correctly-named package; and no
    # per-platform worktree-napi-* stub appears in the list or on disk.
    #
    # To shrink the surface: delete the publish_pkg line AND decrement
    # EXPECTED_PUBLISH_COUNT in scripts/lint-publish-surface.mjs in the same PR.
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Publish Surface Lint (T11400)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint npm publish surface
        run: node scripts/lint-publish-surface.mjs

  contracts-purity:
    # T11418 · Epic T11392 (E5) · Saga T11387 SG-PACKAGE-ARCH
    #
    # Forward-only lock: packages/contracts/ is the type SoT. This gate FAILS
    # when a NEW exported runtime helper (a bodied function/arrow that is not a
    # type guard, zod schema, or const data) is added to a contracts source
    # file. Pre-existing runtime helpers are pinned in
    # scripts/.lint-no-runtime-in-contracts-baseline.json and migrate OUT over
    # time under E5 (T11392); --strict will pass once contracts is pure.
    #
    # After migrating a helper OUT of contracts:
    #   node scripts/lint-no-runtime-in-contracts.mjs --update-baseline
    #   git add scripts/.lint-no-runtime-in-contracts-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Contracts Purity Lint (T11418)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint no runtime logic in contracts (baseline mode)
        run: node scripts/lint-no-runtime-in-contracts.mjs

  tools-skills-boundary:
    # T11409 · Epic T11390 (E3) · Saga T11387 SG-PACKAGE-ARCH
    #
    # Enforces the TOOLS-vs-SKILLS boundary (ATOMIC_TOOL_BOUNDARY in
    # packages/contracts/src/boundary.ts): atomic tool primitives are DEFINED
    # only under packages/core/src/tools + packages/contracts/src/tools; the
    # harness/provider packages (mcp-adapter, caamp, cleo-os) CONSUME them, never
    # redefine. Baseline mode: pre-existing out-of-home definitions are pinned in
    # scripts/.lint-tools-vs-skills-boundary-baseline.json; only NET-NEW
    # redefinitions fail.
    #
    # After migrating an out-of-home definition INTO core/src/tools:
    #   node scripts/lint-tools-vs-skills-boundary.mjs --update-baseline
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Tools-vs-Skills Boundary Lint (T11409)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint tools-vs-skills boundary (baseline mode)
        run: node scripts/lint-tools-vs-skills-boundary.mjs

  crate-publish-guard:
    # T11389 · Epic T11389 (E2) · Saga T11387 SG-PACKAGE-ARCH
    #
    # Zero crates.io publishes (owner decision 2026-05-30): every
    # crates/<name>/Cargo.toml MUST declare `publish = false`. A crate that
    # omits it (Cargo defaults to publishable) or sets `publish = true` could
    # leak an internal crate to crates.io on a stray `cargo publish`. To make a
    # crate genuinely external, set publish = true AND add it to the ALLOWLIST
    # in scripts/lint-no-crate-publish.mjs with rationale.
    #
    # Pure static analysis of checked-in Cargo.toml — no untrusted user input.
    name: Crate Publish Guard (T11389)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint crate publish=false (zero crates.io)
        run: node scripts/lint-no-crate-publish.mjs

  contract-literal-enums:
    # Gate 13 (T11483 · DHQ-035) · Epic T11480 SG-CORE-SELF-TOOLING
    #
    # JSON-Schema `enum: [...]` literals in packages/contracts/src/operations/*
    # hand-duplicate the canonical task-axis enum SSoTs (TASK_KINDS, TASK_SCOPES,
    # TASK_SEVERITIES, TASK_SIZES, TASK_STATUSES, TaskPriority, TaskType). A typo
    # or drifted member sails past tsc (the literal is string[]) and then
    # detonates as a cascade of red CI gates far from the edit. This gate parses
    # the SSoT + the contract literals from SOURCE (never dist/, so a stale dist
    # cannot hide the drift) and FAILS when any literal enum member is not in its
    # canonical SSoT. Run locally before pushing: node
    # scripts/lint-contract-literal-enums.mjs
    #
    # Pure static analysis of checked-in TS source — no untrusted user input.
    name: Contract Literal Enum SSoT (T11483)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint contract-literal enums against canonical SSoT
        run: node scripts/lint-contract-literal-enums.mjs

  llm-chokepoint-guard:
    # Gate 13 (AGENTS.md SSoT table) · T11783 · E9 T11745 · Saga T9831 SG-ARCH-SOLID
    #
    # Forbids LLM resolution + client/transport construction outside the single
    # SSoT chokepoint (resolveLLMForSystem → ModelRunner). PR #954 collapsed the
    # four near-duplicate transport factories onto one ModelRunner; this gate
    # makes resolver-divergence (a new call-site building its own transport / SDK
    # client, reading process.env.*_API_KEY, or hardcoding a model literal) fail
    # CI. Baseline mode: pre-existing call sites are pinned in
    # scripts/.lint-llm-chokepoint-baseline.json; only NET-NEW violations fail.
    #
    # After migrating a call site to the chokepoint:
    #   node scripts/lint-llm-chokepoint.mjs --update-baseline
    #   git add scripts/.lint-llm-chokepoint-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: LLM Chokepoint Guard (T11745)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint LLM chokepoint (baseline mode)
        run: node scripts/lint-llm-chokepoint.mjs

  output-contract-coverage:
    # T11762 ST-3b (T11904) · Epic T11679 · DHQ-057 · LAFS-envelope SSoT T10400 §8 item 6
    #
    # Asserts every operation in the 411-row OPERATIONS registry resolves a
    # machine-readable output contract via getOutputContract (hand-authored
    # OUTPUT_CONTRACTS → derived deriveOutputContract → generic fallback). This is
    # the conformance enforcer the LAFS-envelope SSoT (T10400 §8 item 6) says
    # SHOULD exist but did not. A deterministic static scan of the registry SOURCE
    # files (no DB, no network); it also fail-closes on parse drift (the ordered
    # triple regex disagreeing with the authoritative operation-entry count).
    #
    # Runs in --strict (zero-tolerance): coverage is currently 100% (baseline
    # scripts/.lint-output-contract-coverage-baseline.json is empty), so any op
    # that stops resolving a contract fails CI immediately. To intentionally waive
    # an op (should be rare — prefer fixing deriveOutputContract):
    #   node scripts/lint-output-contract-coverage.mjs --update-baseline
    #   git add scripts/.lint-output-contract-coverage-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: Output-Contract Coverage Gate (T11762)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint per-op output-contract coverage (strict)
        run: node scripts/lint-output-contract-coverage.mjs --strict

  no-bare-get-active-session:
    # T11640 · Epic T11638 EP-SESSION-MANIFEST · Saga T11243
    #
    # `getActiveSession()` resolves "the most-recent active session row" — i.e.
    # whoever wrote the DB last. Under the warm daemon (many concurrent
    # connections sharing one process) and multi-agent spawn isolation (many
    # worktrees writing one DB) that is the WRONG identity: it collapses every
    # caller onto the last writer, causing session-bleed and memory
    # scope-leakage. Identity-meaning callers MUST use resolveCurrentSession() /
    # resolveCurrentSessionId() (connection-handle → CLEO_SESSION_ID →
    # most-recent-active precedence). This gate freezes the current bare-callsite
    # set in scripts/.lint-no-bare-get-active-session-baseline.json and FAILS on
    # any NET-NEW bare getActiveSession( callsite. Per-line opt-out for a
    # justified SCAN-meaning callsite: append
    # `// get-active-session-allowed: <reason>` on the call line.
    #
    # After migrating a callsite to resolveCurrentSession:
    #   node scripts/lint-no-bare-get-active-session.mjs --update-baseline
    #   git add scripts/.lint-no-bare-get-active-session-baseline.json && git commit
    #
    # Pure static analysis of checked-in source — no untrusted user input.
    name: No-Bare-getActiveSession Guard (T11640)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint no NET-NEW bare getActiveSession callsites (baseline mode)
        run: node scripts/lint-no-bare-get-active-session.mjs --check

  merge-bar-aggregate:
    # T11955 · DHQ-072 · Epic T11679 (DHQ burn-down)
    #
    # Regression-locks the merge-bar coverage itself: every PR-gating multi-job
    # workflow MUST keep a complete all-green aggregate gate (this very job's
    # `arch-boundary-check` sibling, plus ci.yml's `ci` job). The lint fails if
    # an aggregate omits a sibling from `needs:`, drops `if: always()`, or stops
    # inspecting `needs.*.result` — so a future job added to either workflow
    # cannot silently fall outside the merge bar.
    #
    # Pure static analysis of checked-in workflow YAML — no untrusted input.
    name: Merge-Bar Aggregate Gate Lint (T11955)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: pnpm install --frozen-lockfile
      - name: Lint merge-bar aggregate gates
        run: node scripts/lint-merge-bar-aggregate.mjs

  arch-boundary-check:
    # T11955 · DHQ-072 · Epic T11679 (DHQ burn-down)
    #
    # Merge-bar aggregate gate. Every lint job in this workflow is an
    # INDEPENDENT top-level status check; before this gate existed only
    # `CI` (from ci.yml), `Lockfile Check`, and `Contracts Dep Lint` were in
    # the branch-protection required-checks contract. A failure in any
    # arch-boundary lint (e.g. the `LLM Chokepoint Guard` / no-hardcoded-models
    # rule that tripped #1037 and landed on main green-looking) was NOT a
    # required check and admin-merge bypassed it entirely.
    #
    # This single job `needs:` EVERY sibling lint and fails if ANY of them
    # failed or was cancelled — so one required context (`Arch Boundary Check`)
    # now covers all 12 arch gates. `if: always()` ensures the gate runs even
    # when an upstream job fails (otherwise GitHub would skip it and report it
    # as not-run, which branch protection treats as missing). Per-line
    # `skipped` is tolerated (path-filtered jobs) but `failure`/`cancelled`
    # fail the gate.
    #
    # The completeness of this `needs:` list (every sibling present, none
    # missing) is itself regression-locked by
    # scripts/lint-merge-bar-aggregate.mjs (Merge-Bar Aggregate Gate Lint).
    name: Arch Boundary Check
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      - db-open-guard
      - define-command-ssot
      - stdout-discipline
      - stdout-write-allowlist
      - publish-surface
      - contracts-purity
      - tools-skills-boundary
      - crate-publish-guard
      - contract-literal-enums
      - llm-chokepoint-guard
      - output-contract-coverage
      - no-bare-get-active-session
      - merge-bar-aggregate
    steps:
      - name: Verify every arch-boundary job passed (or was skipped)
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Upstream job results: ${RESULTS}"
          # Fail the gate if ANY upstream job failed or was cancelled.
          # 'skipped' (path-filtered) and 'success' are acceptable.
          if printf '%s' "${RESULTS}" | tr ',' '\n' | grep -qE '^(failure|cancelled)$'; then
            echo "::error::One or more arch-boundary lint jobs failed or were cancelled — see the upstream job results above."
            exit 1
          fi
          echo "All arch-boundary lint jobs succeeded or were skipped."
