name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      schemas: ${{ steps.filter.outputs.schemas }}
      core: ${{ steps.filter.outputs.core }}
      cleo: ${{ steps.filter.outputs.cleo }}
      contracts: ${{ steps.filter.outputs.contracts }}
      nexus: ${{ steps.filter.outputs.nexus }}
      studio: ${{ steps.filter.outputs.studio }}
      adapters: ${{ steps.filter.outputs.adapters }}
      agents: ${{ steps.filter.outputs.agents }}
      animations: ${{ steps.filter.outputs.animations }}
      brain: ${{ steps.filter.outputs.brain }}
      caamp: ${{ steps.filter.outputs.caamp }}
      cant: ${{ steps.filter.outputs.cant }}
      cleo_os: ${{ steps.filter.outputs.cleo_os }}
      git_shim: ${{ steps.filter.outputs.git_shim }}
      lafs: ${{ steps.filter.outputs.lafs }}
      mcp_adapter: ${{ steps.filter.outputs.mcp_adapter }}
      paths: ${{ steps.filter.outputs.paths }}
      playbooks: ${{ steps.filter.outputs.playbooks }}
      runtime: ${{ steps.filter.outputs.runtime }}
      skills: ${{ steps.filter.outputs.skills }}
      worktree: ${{ steps.filter.outputs.worktree }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vitest.config.ts'
              - 'build.mjs'
            schemas:
              - 'packages/*/schemas/**'
              - 'packages/*/templates/**'
            core:
              - 'packages/core/**'
            cleo:
              - 'packages/cleo/**'
            contracts:
              - 'packages/contracts/**'
            nexus:
              - 'packages/nexus/**'
            studio:
              - 'packages/studio/**'
            adapters:
              - 'packages/adapters/**'
            agents:
              - 'packages/agents/**'
            animations:
              - 'packages/animations/**'
            brain:
              - 'packages/brain/**'
            caamp:
              - 'packages/caamp/**'
            cant:
              - 'packages/cant/**'
            cleo_os:
              - 'packages/cleo-os/**'
            git_shim:
              - 'packages/git-shim/**'
            lafs:
              - 'packages/lafs/**'
            mcp_adapter:
              - 'packages/mcp-adapter/**'
            paths:
              - 'packages/paths/**'
            playbooks:
              - 'packages/playbooks/**'
            runtime:
              - 'packages/runtime/**'
            skills:
              - 'packages/skills/**'
            worktree:
              - 'packages/worktree/**'

  biome:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: '2.4.11'
      - run: biome ci .

  agent-outputs-registration:
    # T1617: Require every .md added to .cleo/agent-outputs/ to be registered
    # via (a) cleo docs add, (b) cleo memory observe, or (c) @no-cleo-register
    # marker in frontmatter. Prevents markdown debt accumulation.
    # Only newly added .md files are checked (git diff --diff-filter=A vs main).
    # No untrusted input used — pure static analysis of checked-in source files.
    name: Agent-Outputs Registration Lint (T1617)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint agent-outputs registration
        run: node scripts/lint-agent-outputs-registration.mjs --since origin/main --severity error

  ssot-lint:
    name: Contracts/Core SSoT (ADR-057)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint Contracts/Core SSoT (ADR-057)
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-core-ssot.mjs --exit-on-fail

  path-drift-lint:
    # T9407 / E-CONFIG-AUTH-UNIFY E1 close-out: reject hard-coded CLEO data
    # paths in packages/core/src/. Catches regressions of the T9403 →
    # @cleocode/paths migration (cleoHomeDir(), literal ~/.local/share/cleo,
    # and un-allowlisted bare process.env['XDG_DATA_HOME'] reads). Pure
    # static analysis of checked-in source — no untrusted input.
    name: Path Drift Lint (T9407)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint CLEO data-path drift in packages/core/src
        run: node scripts/lint-path-drift.mjs

  project-root-anti-pattern-lint:
    # T9584 / E-PROJECT-ROOT-AUDIT close-out + T9685-B4 strict-mode flip:
    # reject the T9550 anti-pattern that materialised rogue `<subdir>/.cleo/`
    # dirs when CLI commands ran from a monorepo subdirectory. Three rules:
    #   1. Bare `process.cwd()` in `packages/core/src/...` (suppress with
    #      `// CWD-OK: <reason>` for legitimate non-project-root uses).
    #   2. `join(..., process.cwd(), ..., '.cleo', ...)` anywhere in packages/.
    #   3. `homedir()` constructing `.cleo` paths outside canonical resolvers
    #      (suppress with `// path-drift-allowed: <reason>` for documented
    #      escape hatches like the `~/.cleo` symlink bootstrap anchor).
    # Strict mode (--strict): zero violations allowed. The T9584 baseline file
    # was deleted after the long-tail batches (T9685-B1, B2, B3) shipped and
    # the count dropped to zero. NEW violations now fail CI immediately.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Project Root Anti-Pattern Lint (T9584)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint project-root anti-pattern in packages/
        run: node scripts/lint-project-root-anti-pattern.mjs --strict

  paths-ssot-lint:
    # T9802 / E-WT-PATHS-SSOT — enforce `packages/paths/` as the sole source
    # of worktree + XDG path resolution. Three rules (baseline-gated, not
    # strict): direct `env-paths` imports, hand-rolled XDG reads, and
    # hand-rolled worktree path calculations. The baseline records the current
    # count at T9802 phase-1 ship; CI fails on net-add (regression prevention).
    # Phase 2 (drive baseline to zero) is tracked in AGENTS.md.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Paths SSoT Lint (T9802)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint paths SSoT anti-patterns in packages/
        run: node scripts/lint-paths-ssot.mjs

  json-stream-hygiene-lint:
    # T9775 / T-JH-8 — last task of T9763 (JSON stream hygiene saga).
    # Rejects NEW `process.stderr.write` / `console.warn` / `console.error`
    # calls in JSON-emitting command paths (cli/commands + core call paths
    # they invoke: memory/, nexus/, sentient/ingesters/, skills/). The 154
    # existing long-tail sites are pinned in scripts/json-stream-hygiene-
    # allowlist.txt with rationales; any addition (or count increase) fails
    # CI with a `pushWarning(...)` fix snippet pointing at @cleocode/core.
    # Pure static analysis of checked-in source — no untrusted input.
    name: JSON Stream Hygiene Lint (T9775)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint JSON stream hygiene in cli/commands + core JSON paths
        run: node scripts/lint-json-stream-hygiene.mjs

  contracts-dep-lint:
    name: Contracts Dep Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enforce contracts dep declarations
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-dep.mjs

  format-error-misuse-lint:
    # T9789 / E-DOCS-FORMATERR-FIX — guard against
    # `cliOutput(formatError(...))` and `cliError(formatError(...))`
    # double-wrap patterns. `formatError` already produces a serialised
    # LAFS envelope; nesting it inside `cliOutput`/`cliError` either
    # fakes success (cliOutput) or replaces the human-readable message
    # with a JSON blob (cliError). Pure static analysis of checked-in
    # source — no untrusted input.
    name: Format-Error Misuse Lint (T9789)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Reject cliOutput(formatError) / cliError(formatError) double-wraps
        run: node scripts/lint-format-error-misuse.mjs

  deprecations-lint:
    # T9795 / Saga T9787 — guard the deprecation registry. Asserts every
    # entry in `.cleo/deprecations.yml` points at a real file that
    # actually carries a TSDoc `@deprecated` tag, and that the YAML
    # conforms to `.cleo/deprecations.schema.json`. Catches drift the
    # moment a legacy file is deleted or renamed without the registry
    # being updated.
    name: Deprecations Registry Lint (T9795)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Validate .cleo/deprecations.yml against schema + path existence
        run: pnpm run lint:deprecations

  pragma-drift:
    name: SQLite Pragma Drift Guard (T9025 / T9190)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Run pragma-drift-guard (T9025)
        # Scans all TS source files to ensure every new DatabaseSync() call
        # has applyPerfPragmas applied within 5 lines. ADR-068 §3.
        # Fails on any production file with a missing applyPerfPragmas call.
        run: pnpm --filter @cleocode/core exec vitest run --reporter=verbose src/__tests__/pragma-drift-guard.test.ts

  db-open-guard:
    name: DB Open Chokepoint Guard (ADR-068 T9047)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Reject raw DatabaseSync() opens outside core/store
        # ADR-068: all DB opens must flow through openCleoDb(role, cwd) in packages/core/src/store/.
        # The allowlist in scripts/lint-no-raw-db-opens.mjs covers legitimate uses
        # (core/store, migration, brain/studio/cleo T9045 sweep complete, etc.).
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-no-raw-db-opens.mjs

  core-first-lint:
    name: CORE-First Architecture Lint (T9622 / E-CORE-FIRST-ARCH)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: CORE-first boundary check (baseline mode — T9616-T9621 in-flight)
        # T9622: enforce that CLI commands and Studio routes do not issue raw SQLite
        # calls (.prepare()) or import from @cleocode/core/internal.
        #
        # Running in --check mode: fails only when violations EXCEED the committed
        # baseline in .cleo/core-first-baseline.json. Once T9616-T9621 land, the
        # baseline shrinks to zero and --check becomes equivalent to a strict ban.
        #
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-core-first.mjs --check

  canon-drift:
    name: Canon Drift Check
    needs: [biome]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build monorepo (cleo + all workspace deps)
        # Use root build script — pnpm --filter @cleocode/cleo run build alone
        # does NOT build workspace dependencies first, so tsc cannot resolve
        # @cleocode/contracts / @cleocode/core/internal / @cleocode/lafs.
        run: pnpm run build
      - name: Run canon drift gate
        run: node packages/cleo/dist/cli/index.js check canon

  canon-check:
    # T9796 — Docs canon-routing CI gate. Loads `.cleo/canon.yml` and rejects
    # NEW *.md files (git diff --diff-filter=A vs the PR's base ref) that
    # land inside a `rawMdPaths` directory whose owning DocKind has
    # `rawMdAllowed: false`. Existing legacy files (migrated by T9791) are
    # never flagged — the gate only fires on ADDITIONS. Saga T9787.
    name: Canon Drift Check (T9796)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build monorepo (cleo + all workspace deps)
        run: pnpm run build
      - name: Run docs canon gate
        run: |
          # On PRs, diff against the base branch — origin/${{ github.base_ref }}
          # — so non-main PR targets (release branches, stacked PRs, etc.) work.
          # On push events, fall back to origin/main.
          base_ref="origin/${{ github.base_ref || 'main' }}"
          echo "canon-check: diffing against $base_ref"
          node packages/cleo/dist/cli/index.js check canon docs --base "$base_ref"

  docs-drift:
    # T9645: gate published docs SSoT vs the on-disk git files.
    # `cleo docs status` exits 2 when any publication has drifted, 0 when
    # all are in-sync, and is a no-op when no `.cleo/docs-publications.json`
    # exists yet. This job IS the release-verify drift gate.
    name: Docs SSoT Drift Gate (T9645)
    needs: [biome]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Skip when no docs ledger exists
        id: ledger-check
        run: |
          if [[ -f .cleo/docs-publications.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No docs-publications.json — gate is a no-op."
          fi
      - run: pnpm install --frozen-lockfile
        if: steps.ledger-check.outputs.exists == 'true'
      - name: Build monorepo (cleo + workspace deps)
        if: steps.ledger-check.outputs.exists == 'true'
        run: pnpm run build
      - name: Run docs drift gate
        if: steps.ledger-check.outputs.exists == 'true'
        run: |
          # `cleo docs status` exits:
          #   0 — every publication in-sync
          #   2 — at least one publication drifted (modified/deleted)
          # Any other non-zero exit is a tool failure and must fail the gate.
          set +e
          node packages/cleo/dist/cli/index.js docs status
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "docs-drift: clean."
            exit 0
          fi
          if [ $rc -eq 2 ]; then
            echo "::error::docs SSoT drift detected — published files have diverged from the blob store."
            echo "::error::Run \`cleo docs sync --from <path> --for <ownerId> --name <blobName>\` for each drifted entry, or wait for the docs-reingest workflow after merge."
            exit 2
          fi
          echo "::error::cleo docs status failed with exit $rc"
          exit $rc

  migration-integrity:
    # Guards against the gitignore-silent-block bug that caused the CI
    # regression fixed in c6ae85a3. Before that, a too-broad "migrations/"
    # rule in .gitignore silently excluded new drizzle migration.sql files,
    # leaving CI to run against pre-migration schema. This job fails if any
    # migration.sql on disk is not tracked in git. Uses only static shell
    # commands — no user input flows into run:.
    name: Migration Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify every migration.sql on disk is tracked in git
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Untracked migration file. Run: git add -f $f"
              missing=$((missing + 1))
            fi
          done < <(find packages crates -name 'migration.sql' -not -path '*/node_modules/*' 2>/dev/null)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing migration file(s) on disk are untracked in git."
            echo "::error::The .gitignore rule 'migrations/' used to be too broad — fixed to '/migrations/' in same commit as this check."
            echo "::error::Fix with: git add -f <path>   (one command per untracked file)"
            exit 1
          fi
          echo "All migration.sql files are properly tracked."

  migration-lint:
    # T1168: Enforced RULE-1 gate — migration.sql files must not end with a
    # trailing "--> statement-breakpoint" (signals a truncated migration).
    # WARN-level findings (RULE-3 snapshot chain, RULE-4 flat SQL) are surfaced
    # as ::warning annotations on the PR diff but do not fail the build.
    # Only ERROR-level violations (RULE-1, RULE-2) fail the job.
    # No untrusted input is used in run: commands — GITHUB_ACTIONS is set
    # automatically by the runner, not from any user-controlled expression.
    name: Migration Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Run migration linter (fail on RULE-1 ERRORs)
        # GITHUB_ACTIONS=true is set automatically by the runner; the linter
        # reads it to emit ::error / ::warning inline annotations on PR diffs.
        run: node scripts/lint-migrations.mjs --fail-on=error

  drizzle-kit-check:
    # T1169: Schema consistency gate — uses drizzle-kit check to verify that
    # schema files match their corresponding migration snapshots. Catches schema
    # drift without requiring a full migration run. As of T1175 (after T1165,
    # T1166, and T1176 baseline resets landed), this gate is now blocking —
    # schema drift failures will fail the build and block PRs.
    # See docs/architecture/migrations/schema-consistency.md for details.
    name: Drizzle Kit Schema Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Run drizzle-kit check on all 5 DB configs
        id: schema-check
        run: pnpm db:check

  typecheck:
    name: Type Check
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Type check with project references
        run: pnpm run typecheck

  unit-tests:
    name: Unit Tests (${{ matrix.os }}, shard ${{ matrix.shard }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        # Windows shards temporarily disabled pending T9182/T9181 follow-up — pre-existing
        # afterEach hook hangs on injection-chain + orchestrate-engine + paths tests.
        # Linux + macOS validate cross-platform correctness for v2026.5.50.
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        shard: [1, 2]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build cant-napi native addon for CANT tests
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release -p cant-napi
          case "${{ runner.os }}" in
            macOS)
              triple="darwin-x64"
              if [[ "$(uname -m)" == "arm64" ]]; then
                triple="darwin-arm64"
              fi
              cp target/release/libcant_napi.dylib "crates/cant-napi/cant-napi.${triple}.node"
              ;;
            Windows)
              triple="win32-x64-msvc"
              if [[ "${PROCESSOR_ARCHITECTURE:-}" == "ARM64" ]]; then
                triple="win32-arm64-msvc"
              fi
              cp target/release/cant_napi.dll "crates/cant-napi/cant-napi.${triple}.node"
              ;;
          esac
      - name: Build packages (required for cross-package imports)
        run: pnpm run build
      - name: Generate SvelteKit type stubs (required for studio tests)
        # packages/studio/tsconfig.json extends .svelte-kit/tsconfig.json which
        # is generated by svelte-kit sync. Previously .svelte-kit/ was tracked in
        # git (inadvertently). After adding it to .gitignore (v2026.4.60), we must
        # generate it explicitly in CI before running tests. No user input used.
        run: pnpm --filter @cleocode/studio exec svelte-kit sync
      - name: Resolve test scope (per-package fast path or full shard sweep)
        # On PRs NOT targeting main with ≤3 packages changed, run only the
        # affected package tests via pnpm test:pkg for faster feedback.
        # Always falls back to the full 2-shard sweep when:
        #   - targeting main (cross-platform matrix already handles this)
        #   - more than 3 packages changed (too broad for per-package scoping)
        #   - the changed-package set is ambiguous (root config files touched)
        # Per-package scoping is an OPTIONAL fast path, NOT a replacement.
        # The shard run is always the safe fallback.
        id: test-scope
        shell: bash
        run: |
          # Targeting main always uses full shard sweep (set by matrix strategy).
          # For non-main PRs, check how many individual packages changed.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "main" ]]; then
            changed_pkgs=""
            [[ "${{ needs.changes.outputs.core }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/core"
            [[ "${{ needs.changes.outputs.cleo }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo"
            [[ "${{ needs.changes.outputs.contracts }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/contracts"
            [[ "${{ needs.changes.outputs.nexus }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/nexus"
            [[ "${{ needs.changes.outputs.studio }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/studio"
            [[ "${{ needs.changes.outputs.adapters }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/adapters"
            [[ "${{ needs.changes.outputs.agents }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/agents"
            [[ "${{ needs.changes.outputs.animations }}"  == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/animations"
            [[ "${{ needs.changes.outputs.brain }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/brain"
            [[ "${{ needs.changes.outputs.caamp }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/caamp"
            [[ "${{ needs.changes.outputs.cant }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cant"
            [[ "${{ needs.changes.outputs.cleo_os }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo-os"
            [[ "${{ needs.changes.outputs.git_shim }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/git-shim"
            [[ "${{ needs.changes.outputs.lafs }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/lafs"
            [[ "${{ needs.changes.outputs.mcp_adapter }}" == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/mcp-adapter"
            [[ "${{ needs.changes.outputs.paths }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/paths"
            [[ "${{ needs.changes.outputs.playbooks }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/playbooks"
            [[ "${{ needs.changes.outputs.runtime }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/runtime"
            [[ "${{ needs.changes.outputs.skills }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/skills"
            [[ "${{ needs.changes.outputs.worktree }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/worktree"
            changed_pkgs="${changed_pkgs# }"  # trim leading space
            pkg_count=$(echo "$changed_pkgs" | wc -w)
            if [[ -n "$changed_pkgs" && "$pkg_count" -le 3 ]]; then
              echo "mode=per_package_tests" >> "$GITHUB_OUTPUT"
              echo "pkgs=$changed_pkgs"     >> "$GITHUB_OUTPUT"
              echo "Per-package fast path: $changed_pkgs ($pkg_count package(s))"
            else
              echo "mode=shard" >> "$GITHUB_OUTPUT"
              echo "pkgs="      >> "$GITHUB_OUTPUT"
              echo "Full shard sweep: $pkg_count package(s) changed (or root config touched)"
            fi
          else
            echo "mode=shard" >> "$GITHUB_OUTPUT"
            echo "pkgs="      >> "$GITHUB_OUTPUT"
            echo "Full shard sweep: targeting main or push event"
          fi
      - name: Run unit tests — per-package fast path (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode == 'per_package_tests' && matrix.shard == 1
        # Only runs on shard 1 to avoid duplicates; per-package scope is
        # already narrow enough that sharding provides no meaningful benefit.
        run: pnpm test:pkg ${{ steps.test-scope.outputs.pkgs }}
      - name: Run unit tests — full shard sweep (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode != 'per_package_tests'
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vitest run --shard=${{ matrix.shard }}/2 2>&1 | tee /tmp/vitest-shard${{ matrix.shard }}.log
      - name: T9170 — schema-warning budget gate (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode != 'per_package_tests' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: node scripts/check-schema-warning-budget.mjs /tmp/vitest-shard${{ matrix.shard }}.log

  build-verify:
    name: Build & Verify (${{ matrix.os }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        # Windows temporarily disabled pending T9182/T9181 follow-up.
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]') }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ──────────────────────────────────────────────────────────────────
      # COLD-STATE BUILD GATE
      #
      # Purpose: catch workspace-dependency-order regressions in build.mjs
      # at PR-time, never at release-time.
      #
      # Background: in v2026.4.8 the release workflow failed at the Build
      # step because caamp's tsup DTS resolver couldn't find @cleocode/cant
      # — caamp had grown a new import that depended on cant's .d.ts files
      # being present on disk before caamp built, but build.mjs's order had
      # caamp building first. The bug only reproduced from a fully clean
      # state (no dist, no tsbuildinfo) because local re-builds left stale
      # dist files behind that masked the gap.
      #
      # CI checkouts are already fresh, so this defensive `rm -rf` is
      # belt-and-braces — it guarantees the build runs from zero state
      # regardless of any future caching changes to actions/checkout or
      # actions/cache. If someone reorders build.mjs incorrectly again,
      # this step fails and blocks the merge.
      # ──────────────────────────────────────────────────────────────────
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Cold-state cleanup (defense against build-order regressions)
        shell: bash
        run: |
          rm -rf packages/*/dist packages/*/tsconfig.tsbuildinfo
          echo "Cleaned dist and tsbuildinfo from all packages."
      - name: Build all packages from cold state (catches dep-order regressions)
        run: node build.mjs
      - name: Verify core dist exists
        shell: bash
        run: |
          test -f packages/core/dist/index.js || (echo "packages/core/dist/index.js missing" && exit 1)
      - name: Verify lafs dist exists
        shell: bash
        run: |
          test -f packages/lafs/dist/src/index.js || (echo "packages/lafs/dist/src/index.js missing" && exit 1)
      - name: Verify caamp dist exists
        shell: bash
        run: |
          test -f packages/caamp/dist/index.js || (echo "packages/caamp/dist/index.js missing" && exit 1)
      - name: Verify cant dist exists
        shell: bash
        run: |
          test -f packages/cant/dist/index.js || (echo "packages/cant/dist/index.js missing" && exit 1)
      - name: Verify runtime dist exists
        shell: bash
        run: |
          test -f packages/runtime/dist/index.js || (echo "packages/runtime/dist/index.js missing" && exit 1)
      - name: Verify CLI binary
        shell: bash
        run: node packages/cleo/dist/cli/index.js version
      - name: Verify mcp-adapter dist exists
        shell: bash
        run: |
          test -f packages/mcp-adapter/dist/cli.js || (echo "packages/mcp-adapter/dist/cli.js missing — build.mjs did not build @cleocode/mcp-adapter" && exit 1)
      - name: Verify MCP adapter server starts and responds
        if: matrix.os != 'windows-latest'
        shell: bash
        # Real smoke test: pipe a JSON-RPC 2.0 `initialize` request, close
        # stdin, and assert the response carries the expected serverInfo.name.
        # Catches regressions like:
        #   - missing dist (MODULE_NOT_FOUND on cli.js / server.js)
        #   - broken transitive imports (@cleocode/core load failure)
        #   - protocol-handler crashes on initialize
        # Failing exit code FAILS the job — no `|| true` masking.
        run: |
          OUTPUT=$(node -e "const { spawnSync } = require('node:child_process'); const r = spawnSync(process.execPath, ['packages/mcp-adapter/dist/cli.js'], { input: '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{}}\n', encoding: 'utf8', timeout: 10000 }); process.stdout.write(r.stdout || ''); process.stderr.write(r.stderr || ''); if (r.error) { console.error(r.error.message); process.exit(1); } process.exit(r.status ?? 1);")
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '"name":"cleo-mcp-adapter"' \
            || (echo "MCP adapter did not return expected initialize response" && exit 1)

  validate-json:
    name: Validate JSON Schemas
    needs: [biome, changes]
    if: needs.changes.outputs.schemas == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Validate JSON schema files
        run: |
          find packages -name '*.json' -path '*/schemas/*' | while read file; do
            echo "Validating: $file"
            jq empty "$file"
          done

  install-test:
    name: Install Test
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies and build
        run: pnpm install --frozen-lockfile && node build.mjs
      - name: Test global link (simulates global install)
        run: |
          cd packages/cleo && pnpm link --global && cd ../..
          cleo version
          cleo --help
      - name: Test MCP server flag
        run: timeout 5 cleo --mcp-server 2>&1 || true
      - name: Test project initialization
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          cleo init test-project
          ls -la .cleo/
      - name: Cleanup
        if: always()
        run: pnpm unlink --global @cleocode/cleo

  forge-ts-check:
    name: Documentation Coverage (forge-ts)
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Check TSDoc coverage
        run: pnpm exec forge-ts check --human || true
      - name: Build documentation
        run: pnpm exec forge-ts build || true
