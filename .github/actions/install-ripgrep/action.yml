name: Install ripgrep

description: Install ripgrep on GitHub-hosted Linux, macOS, and Windows runners.

runs:
  using: composite
  steps:
    - name: Check for existing ripgrep
      id: check
      shell: bash
      run: |
        if command -v rg >/dev/null 2>&1; then
          echo "present=true" >> "$GITHUB_OUTPUT"
          rg --version
        else
          echo "present=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install ripgrep on Linux
      if: runner.os == 'Linux' && steps.check.outputs.present != 'true'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ripgrep

    - name: Install ripgrep on macOS
      if: runner.os == 'macOS' && steps.check.outputs.present != 'true'
      shell: bash
      run: brew install ripgrep

    - name: Install ripgrep on Windows
      if: runner.os == 'Windows' && steps.check.outputs.present != 'true'
      shell: pwsh
      run: choco install ripgrep -y --no-progress

    - name: Verify ripgrep
      shell: bash
      run: rg --version
