name: worktree-napi prebuild

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'crates/worktree-napi/**'
      - 'crates/worktrunk-core/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/worktree-napi-prebuild.yml'
  pull_request:
    paths:
      - 'crates/worktree-napi/**'
      - 'crates/worktrunk-core/**'
      - 'rust-toolchain.toml'
      - '.github/workflows/worktree-napi-prebuild.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.triple }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            triple: linux-x64-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            triple: linux-arm64-gnu
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            triple: darwin-x64
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            triple: darwin-arm64
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            triple: win32-x64-msvc
            cross: false
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux arm64)
        if: matrix.cross == true
        shell: bash
        run: cargo install cross --locked

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        shell: bash
        run: pnpm install --frozen-lockfile --filter '!@cleocode/studio'

      - name: Build napi binding (${{ matrix.target }})
        working-directory: crates/worktree-napi
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.cross }}" = "true" ]; then
            pnpm --package=@napi-rs/cli@3 dlx napi build --release --target ${{ matrix.target }} --use-cross
          else
            pnpm --package=@napi-rs/cli@3 dlx napi build --release --target ${{ matrix.target }}
          fi
          # napi build writes worktree-napi.node — rename to triple-suffixed name
          # expected by the loader (`worktree-napi.<triple>.node`).
          if [ -f worktree-napi.node ]; then
            mv worktree-napi.node "worktree-napi.${{ matrix.triple }}.node"
          fi
          ls -la *.node

      - name: Upload prebuilt artifact
        uses: actions/upload-artifact@v4
        with:
          name: worktree-napi-${{ matrix.triple }}
          path: crates/worktree-napi/worktree-napi.*.node
          if-no-files-found: error
          retention-days: 14
