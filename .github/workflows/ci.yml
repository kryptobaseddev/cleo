name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      schemas: ${{ steps.filter.outputs.schemas }}
      core: ${{ steps.filter.outputs.core }}
      cleo: ${{ steps.filter.outputs.cleo }}
      contracts: ${{ steps.filter.outputs.contracts }}
      nexus: ${{ steps.filter.outputs.nexus }}
      studio: ${{ steps.filter.outputs.studio }}
      adapters: ${{ steps.filter.outputs.adapters }}
      agents: ${{ steps.filter.outputs.agents }}
      animations: ${{ steps.filter.outputs.animations }}
      brain: ${{ steps.filter.outputs.brain }}
      caamp: ${{ steps.filter.outputs.caamp }}
      cant: ${{ steps.filter.outputs.cant }}
      cleo_os: ${{ steps.filter.outputs.cleo_os }}
      git_shim: ${{ steps.filter.outputs.git_shim }}
      lafs: ${{ steps.filter.outputs.lafs }}
      mcp_adapter: ${{ steps.filter.outputs.mcp_adapter }}
      paths: ${{ steps.filter.outputs.paths }}
      playbooks: ${{ steps.filter.outputs.playbooks }}
      runtime: ${{ steps.filter.outputs.runtime }}
      skills: ${{ steps.filter.outputs.skills }}
      worktree: ${{ steps.filter.outputs.worktree }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vitest.config.ts'
              - 'build.mjs'
            schemas:
              - 'packages/*/schemas/**'
              - 'packages/*/templates/**'
            workflows:
              - '.github/workflows/**'
              - 'packages/*/templates/workflows/**'
              - 'scripts/lint-deployed-template-parity.mjs'
              - '.lint-deployed-template-parity-baseline.json'
            core:
              - 'packages/core/**'
            cleo:
              - 'packages/cleo/**'
            contracts:
              - 'packages/contracts/**'
            nexus:
              - 'packages/nexus/**'
            studio:
              - 'packages/studio/**'
            adapters:
              - 'packages/adapters/**'
            agents:
              - 'packages/agents/**'
            animations:
              - 'packages/animations/**'
            brain:
              - 'packages/brain/**'
            caamp:
              - 'packages/caamp/**'
            cant:
              - 'packages/cant/**'
            cleo_os:
              - 'packages/cleo-os/**'
            git_shim:
              - 'packages/git-shim/**'
            lafs:
              - 'packages/lafs/**'
            mcp_adapter:
              - 'packages/mcp-adapter/**'
            paths:
              - 'packages/paths/**'
            playbooks:
              - 'packages/playbooks/**'
            runtime:
              - 'packages/runtime/**'
            skills:
              - 'packages/skills/**'
            worktree:
              - 'packages/worktree/**'

  biome:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: '2.4.11'
      - run: biome ci .

  adr-index-jsonl-frozen-lint:
    # T10165 / Saga T9855 SG-TEMPLATE-CONFIG-SSOT — the `.cleo/adrs/adr-index.jsonl`
    # portability export is frozen. Canonical store for the same metadata
    # is the `attachments` table provenance columns (T10158). The lint
    # walks the file's frozen invariants AND diffs against origin/main to
    # catch newly-appended data lines. Pure static analysis — no user
    # input flows here.
    name: ADR Index JSONL Frozen (T10165)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint adr-index.jsonl frozen invariants
        run: node scripts/lint-adr-index-jsonl-frozen.mjs --check-no-growth --base=origin/main

  worktree-location-lint:
    # T9809 / Saga T9800 SG-WORKTREE-CANON — D009 council verdict:
    # Rejects any git worktree whose path is outside the canonical XDG
    # location `<cleoHome>/worktrees/<projectHash>/<taskId>/`, and also
    # rejects a `worktrees/` *directory* under `<repo>/.cleo/` (only the
    # sentinel file `.cleo/worktrees.json` is allowed).
    # Pure static analysis of live git state — no user input flows here.
    name: Worktree Location Lint (T9809)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint worktree locations
        # In CI the only registered worktree is the primary checkout — no
        # rogue worktrees should exist. The script exits 0 when clean.
        run: node scripts/lint-worktree-location.mjs

  orphan-cleo-dir-check:
    # T10155 / Saga T9862 SG-WORKTREE-CANON Wave 5 — orphan-`.cleo/` regression
    # guard. Scans `git diff --diff-filter=A` between the PR base and HEAD for
    # any newly-added file matching `.claude/worktrees/<sessionId>/.cleo/**`.
    # Fires with a clear error referencing T9550/T9580 (the two historical
    # incidents) so the operator can find the in-source regression that
    # synthesised the rogue path. Complementary to `lint-project-root-anti-
    # pattern.mjs` (T9584) — that gate catches the source-level anti-pattern;
    # this one catches the materialised symptom if a brand-new pattern slips
    # through. Pure static analysis of `git diff` output — no untrusted input.
    name: Orphan .cleo/ Dir Check (T10155)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so `git diff origin/<base>...HEAD` resolves
          # both ends — shallow clones drop the base ref's commit.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve PR base ref
        # `github.base_ref` is unset on pushes; fall back to `main` so direct
        # pushes to feature branches are still scanned.
        run: echo "BASE_REF=origin/${{ github.base_ref || 'main' }}" >> $GITHUB_ENV
      - name: Lint orphan .cleo/ paths in PR-added files
        run: node scripts/lint-orphan-cleo-dir.mjs --base "$BASE_REF"

  agent-outputs-registration:
    # T1617: Require every .md added to .cleo/agent-outputs/ to be registered
    # via (a) cleo docs add, (b) cleo memory observe, or (c) @no-cleo-register
    # marker in frontmatter. Prevents markdown debt accumulation.
    # Only newly added .md files are checked (git diff --diff-filter=A vs main).
    # No untrusted input used — pure static analysis of checked-in source files.
    name: Agent-Outputs Registration Lint (T1617)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint agent-outputs registration
        run: node scripts/lint-agent-outputs-registration.mjs --since origin/main --severity error

  ssot-lint:
    name: Contracts/Core SSoT (ADR-057)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint Contracts/Core SSoT (ADR-057)
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-core-ssot.mjs --exit-on-fail

  path-drift-lint:
    # T9407 / E-CONFIG-AUTH-UNIFY E1 close-out: reject hard-coded CLEO data
    # paths in packages/core/src/. Catches regressions of the T9403 →
    # @cleocode/paths migration (cleoHomeDir(), literal ~/.local/share/cleo,
    # and un-allowlisted bare process.env['XDG_DATA_HOME'] reads). Pure
    # static analysis of checked-in source — no untrusted input.
    name: Path Drift Lint (T9407)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint CLEO data-path drift in packages/core/src
        run: node scripts/lint-path-drift.mjs

  project-root-anti-pattern-lint:
    # T9584 / E-PROJECT-ROOT-AUDIT close-out + T9685-B4 strict-mode flip:
    # reject the T9550 anti-pattern that materialised rogue `<subdir>/.cleo/`
    # dirs when CLI commands ran from a monorepo subdirectory. Three rules:
    #   1. Bare `process.cwd()` in `packages/core/src/...` (suppress with
    #      `// CWD-OK: <reason>` for legitimate non-project-root uses).
    #   2. `join(..., process.cwd(), ..., '.cleo', ...)` anywhere in packages/.
    #   3. `homedir()` constructing `.cleo` paths outside canonical resolvers
    #      (suppress with `// path-drift-allowed: <reason>` for documented
    #      escape hatches like the `~/.cleo` symlink bootstrap anchor).
    # Strict mode (--strict): zero violations allowed. The T9584 baseline file
    # was deleted after the long-tail batches (T9685-B1, B2, B3) shipped and
    # the count dropped to zero. NEW violations now fail CI immediately.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Project Root Anti-Pattern Lint (T9584)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint project-root anti-pattern in packages/
        run: node scripts/lint-project-root-anti-pattern.mjs --strict

  paths-ssot-lint:
    # T9802 / E-WT-PATHS-SSOT — enforce `packages/paths/` as the sole source
    # of worktree + XDG path resolution. Three rules (baseline-gated, not
    # strict): direct `env-paths` imports, hand-rolled XDG reads, and
    # hand-rolled worktree path calculations. The baseline records the current
    # count at T9802 phase-1 ship; CI fails on net-add (regression prevention).
    # Phase 2 (drive baseline to zero) is tracked in AGENTS.md.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Paths SSoT Lint (T9802)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint paths SSoT anti-patterns in packages/
        run: node scripts/lint-paths-ssot.mjs

  saga-label-anti-pattern-lint:
    # T10332 / Saga T10326 SG-SUBSTRATE-RECONCILIATION Wave 3A — block NEW
    # occurrences of the legacy "Saga as label" anti-pattern in production
    # code. Four rules (baseline-gated, not strict):
    #   1. `labels.includes('saga')` — legacy label-encoded discriminant.
    #   2. `hasSagaLabel(labels)`     — private helper inside enforcement.ts.
    #   3. `isSagaEpic(task)`         — query-ops legacy helper.
    #   4. `SAGA_LABEL`               — @deprecated string constant.
    # Post-Wave 2 (T10330+T10331) the canonical replacement is
    # `isSagaShape(task)` / `isSagaType(task.type)`. Baseline pins residuals;
    # CI fails on net-add. Strict mode flips on at W3.C T10334 cutover.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Saga Label Anti-Pattern Lint (T10332)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint saga-label anti-patterns in packages/
        run: node scripts/lint-saga-label-anti-pattern.mjs --strict

  invariant-registry-lint:
    # T10338 / Saga T10326 SG-SUBSTRATE-RECONCILIATION Wave 3 R4 — validate
    # the central invariants registry at `packages/contracts/src/invariants/`
    # in both directions:
    #   FORWARD — every entry's runtimeGate.module, runtimeGate.functionName,
    #             lintRule.lintScript, doctorAudit.lintScript, and tests[]
    #             paths exist on disk and (for functionName) are exported by
    #             the target module.
    #   REVERSE — every numbered code declared by an ADR source file
    #             (ADR-073 I1-I8, ADR-070 ORC-001..ORC-014, ADR-056 D1-D6)
    #             appears in the registry, unless explicitly noted in the
    #             script's DOCS_ONLY_OVERRIDES set with a reason.
    # Baseline-gated (not strict): pins the current state at the T10338 ship
    # and fails on net-add. Improvements (count drops) are always accepted.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Invariant Registry Lint (T10338)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint invariant registry forward + reverse symmetry
        run: node scripts/lint-invariant-registry.mjs

  invariants-docs-render-drift:
    # T10342 / Saga T10326 SG-SUBSTRATE-RECONCILIATION Wave 3 R8 — keep
    # `docs/registry/INVARIANTS.md` in lockstep with the central
    # `INVARIANTS_REGISTRY` SSoT. The job:
    #   1. Builds @cleocode/contracts (TS-only target — schemas not needed).
    #   2. Re-renders the docs page from the compiled registry.
    #   3. Compares the rendered output against the committed file via
    #      `--check`. Drift = CI failure with a remediation hint.
    # Strict gate: zero tolerance — the rendered output is deterministic
    # and the registry is the SSoT, so any drift is unambiguously a stale
    # docs commit.
    name: Invariants Docs Render Drift (T10342)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Build @cleocode/contracts (TS only)
        run: pnpm --filter @cleocode/contracts run build:ts
      - name: Verify docs/registry/INVARIANTS.md matches registry SSoT
        run: node packages/contracts/scripts/render-invariants-docs.mjs --check

  raw-git-worktree-lint:
    # T9984 / E7-CORE-LAYERING — enforce `@cleocode/worktree` as the sole
    # source of `git worktree` shell-outs in the workspace. Strict gate: any
    # raw `git worktree <verb>` invocation under `packages/` that is NOT in
    # the allowlist fails CI. Comments and test files are intentionally
    # excluded (test fixtures legitimately construct on-disk git worktrees).
    # Pure static analysis of checked-in source — no untrusted input.
    name: Raw Git Worktree Lint (T9984)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint raw git-worktree shell-outs in packages/
        run: node scripts/lint-no-raw-git-worktree.mjs

  saga-symbol-leakage-lint:
    # T10120 / E-SAGAS-CORE-MODULE / Saga T10113 — enforce
    # `packages/core/src/sagas/` as the SOLE source of SAGA_LABEL,
    # SAGA_GROUPS_RELATION, and resolveSagaMemberIds. Re-defining or
    # hand-rolling any of these outside the new SSoT (and the single
    # compat shim at packages/core/src/tasks/list.ts) is a Package-
    # Boundary Check violation per AGENTS.md.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Saga Symbol Leakage Lint (T10120)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint saga symbol leakage in packages/
        run: node scripts/lint-saga-symbol-leakage.mjs

  json-stream-hygiene-lint:
    # T9775 / T-JH-8 — last task of T9763 (JSON stream hygiene saga).
    # Rejects NEW `process.stderr.write` / `console.warn` / `console.error`
    # calls in JSON-emitting command paths (cli/commands + core call paths
    # they invoke: memory/, nexus/, sentient/ingesters/, skills/). The 154
    # existing long-tail sites are pinned in scripts/json-stream-hygiene-
    # allowlist.txt with rationales; any addition (or count increase) fails
    # CI with a `pushWarning(...)` fix snippet pointing at @cleocode/core.
    # Pure static analysis of checked-in source — no untrusted input.
    name: JSON Stream Hygiene Lint (T9775)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint JSON stream hygiene in cli/commands + core JSON paths
        run: node scripts/lint-json-stream-hygiene.mjs

  rust-vendor-parity-lint:
    # T10224 / SG-BOUNDARY-REGISTRY (T10176) — enforce parity between
    # TypeScript canonical sources and the Rust vendored copies that allow
    # cant-core + lafs-core to ship to crates.io. `cargo publish` rejects
    # `include_str!` / build-script paths that traverse outside the crate
    # directory, so the canonical schema (`packages/lafs/schemas/v1/...`)
    # and hook-mappings (`packages/caamp/providers/hook-mappings.json`) are
    # mirrored into `crates/lafs-core/schemas/v1/` and
    # `crates/cant-core/vendor/caamp/` respectively. Drift between the TS
    # canonical and the Rust vendor is a wire-protocol regression vector.
    # Pure static analysis of checked-in files — no untrusted input.
    name: Rust Vendor Parity Lint (T10224)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enforce LAFS schema parity (TS canonical <-> lafs-core vendor)
        run: node scripts/lint-lafs-schema-parity.mjs --exit-on-fail
      - name: Enforce hook-mappings parity (TS canonical <-> cant-core vendor)
        run: node scripts/lint-cant-core-hook-mappings-parity.mjs --exit-on-fail

  contracts-dep-lint:
    name: Contracts Dep Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enforce contracts dep declarations
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-dep.mjs

  contracts-fan-out-lint:
    # T10074 / E-SSOT-ENFORCEMENT (T9837) — Saga T9831 SG-ARCH-SOLID:
    # Detects `export interface` and `export type` declarations in
    # packages/cleo/src/ and packages/core/src/ that are imported by more
    # than 2 other packages (fan-out > 2). High-fan-out types should live in
    # packages/contracts/ so consumers import a leaf package rather than the
    # full cleo/core dependency graph.
    #
    # Baseline mode: CI compares against scripts/.lint-contracts-fan-out-baseline.json
    # and fails only when the count INCREASES (regression prevention). A count
    # decrease means progress and is always accepted.
    #
    # Pure static analysis of checked-in source — no untrusted input.
    name: Contracts Fan-Out Lint (T10074)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Detect high-fan-out types that should be in packages/contracts
        run: node scripts/lint-contracts-fan-out.mjs

  format-error-misuse-lint:
    # T9789 / E-DOCS-FORMATERR-FIX — guard against
    # `cliOutput(formatError(...))` and `cliError(formatError(...))`
    # double-wrap patterns. `formatError` already produces a serialised
    # LAFS envelope; nesting it inside `cliOutput`/`cliError` either
    # fakes success (cliOutput) or replaces the human-readable message
    # with a JSON blob (cliError). Pure static analysis of checked-in
    # source — no untrusted input.
    name: Format-Error Misuse Lint (T9789)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Reject cliOutput(formatError) / cliError(formatError) double-wraps
        run: node scripts/lint-format-error-misuse.mjs

  deprecations-lint:
    # T9795 / Saga T9787 — guard the deprecation registry. Asserts every
    # entry in `.cleo/deprecations.yml` points at a real file that
    # actually carries a TSDoc `@deprecated` tag, and that the YAML
    # conforms to `.cleo/deprecations.schema.json`. Catches drift the
    # moment a legacy file is deleted or renamed without the registry
    # being updated.
    name: Deprecations Registry Lint (T9795)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Validate .cleo/deprecations.yml against schema + path existence
        run: pnpm run lint:deprecations

  pragma-drift:
    name: SQLite Pragma Drift Guard (T9025 / T9190)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Run pragma-drift-guard (T9025)
        # Scans all TS source files to ensure every new DatabaseSync() call
        # has applyPerfPragmas applied within 5 lines. ADR-068 §3.
        # Fails on any production file with a missing applyPerfPragmas call.
        run: pnpm --filter @cleocode/core exec vitest run --reporter=verbose src/__tests__/pragma-drift-guard.test.ts

  db-open-guard:
    name: DB Open Chokepoint Guard (ADR-068 T9047)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Reject raw DatabaseSync() opens outside core/store
        # ADR-068: all DB opens must flow through openCleoDb(role, cwd) in packages/core/src/store/.
        # The allowlist in scripts/lint-no-raw-db-opens.mjs covers legitimate uses
        # (core/store, migration, brain/studio/cleo T9045 sweep complete, etc.).
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-no-raw-db-opens.mjs

  cross-db-annotation-lint:
    name: Cross-DB Annotation Lint (T10324)
    # T10324 / Saga T10281 SG-BRAIN-DB-RESILIENCE / Epic T10285 E4-DB-CROSS-LINKS —
    # enforce the ADR-068 "Cross-DB Reference Columns" amendment. Every Drizzle
    # column whose value points at a row in a DIFFERENT .db file must carry an
    # `@cross-db <targetRole>.<table>.<column>` JSDoc tag immediately above the
    # declaration. Runs in --check mode against
    # scripts/.lint-cross-db-annotations-baseline.json (seeded at 0); net-add of
    # un-annotated cross-DB columns fails the gate. Pure static analysis — no
    # untrusted input.
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint cross-DB columns in Drizzle schemas (baseline mode)
        run: node scripts/lint-cross-db-annotations.mjs --check

  core-first-lint:
    name: CORE-First Architecture Lint (T9622 / E-CORE-FIRST-ARCH)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: CORE-first boundary check (baseline mode — T9616-T9621 in-flight)
        # T9622: enforce that CLI commands and Studio routes do not issue raw SQLite
        # calls (.prepare()) or import from @cleocode/core/internal.
        #
        # Running in --check mode: fails only when violations EXCEED the committed
        # baseline in .cleo/core-first-baseline.json. Once T9616-T9621 land, the
        # baseline shrinks to zero and --check becomes equivalent to a strict ban.
        #
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-core-first.mjs --check

  ssot-exempt-lint:
    # T10075 / Epic T9837 / Saga T9831 SG-ARCH-SOLID — guard the SSoT-EXEMPT
    # escape-hatch. Every NEW SSoT-EXEMPT comment added in a PR must:
    #   (a) include a linked T#### task ID, AND
    #   (b) point at a task that is NOT in a terminal state (completed/cancelled/deleted).
    # Runs in --strict mode: zero new SSoT-EXEMPT comments allowed regardless of
    # task linkage. If a genuine architectural escape-hatch is needed, the team
    # must first file an open follow-up task and explicitly relax this gate.
    # Pure static analysis of checked-in source — no untrusted input.
    name: SSoT-EXEMPT Lint (T10075 / T9837)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Fetch base branch for diff
        run: git fetch origin main --depth=1
      - name: Lint SSoT-EXEMPT comments in PR diff (strict — no new exemptions)
        # Diffs newly added lines in this PR against origin/main.
        # --strict: any new SSoT-EXEMPT comment fails the gate.
        # --base: the ref to diff against (defaults to origin/main).
        # CLEO_BIN is not set — task-ID verification is skipped in CI since
        # the cleo CLI requires a live database. The strict mode does not
        # need task verification (it blocks everything unconditionally).
        run: node scripts/lint-no-ssot-exempt.mjs --strict --base origin/main

  deployed-template-parity:
    # T9860 / Saga T9855 SG-TEMPLATE-CONFIG-SSOT — dogfood gate.
    # `packages/cleo/templates/workflows/*.yml.tmpl` (being relocated to
    # `packages/core/templates/workflows/*.yml.tmpl` by T9858) are the canonical
    # sources for GitHub Actions workflows shipped to consuming projects via
    # `cleo init --workflows`. The deployed copies under .github/workflows/
    # here are supposed to BE the rendered output. Today they drift — this
    # gate establishes a baseline of the accepted drift and fails CI on any
    # NEW divergence. The drift itself is closed by a SEPARATE follow-up.
    # Runs whenever workflows, templates, the script, or the baseline change.
    # Pure static analysis of checked-in source — no untrusted input.
    name: Deployed Template Parity (T9860)
    needs: changes
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Lint deployed workflows against shipped templates (baseline mode)
        run: node scripts/lint-deployed-template-parity.mjs

  cli-boundary-lint:
    # T10076 / Epic T9837 / Saga T9831 SG-ARCH-SOLID — CLI package boundary gate.
    # Flags non-dispatch helper functions > 30 LOC in packages/cleo/src/cli/commands/.
    # These belong in packages/core/.
    #
    # Running in --check mode: fails only when the violation COUNT INCREASES
    # above the committed baseline in scripts/.lint-cli-boundary-baseline.json.
    # Count decreases (i.e. helpers migrated to core) always pass.
    name: CLI Boundary Lint (T10076 / T9837)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: CLI package boundary gate (baseline mode — T9837e)
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-cli-package-boundary.mjs --check

  dockind-writer-uniqueness:
    # T10369 / Epic T10290 / Saga T10288 SG-DOCS-INTEGRITY — DocKind Writer
    # Uniqueness gate. Enforces ONE writer per BuiltinDocKind in
    # `packages/core/src/docs/writer-registry.ts`, asserts that every
    # `mode: 'ssot-first'` descriptor aligns with `.cleo/canon.yml`'s
    # `canonicalHome`, and flags raw `*.md` writes in `packages/core/src/**`
    # that bypass the canonical writer set.
    #
    # Schema-parity rules (registry coverage + canon.yml drift) are ALWAYS
    # strict — there is no baseline for those. The unregistered-md-write
    # rule runs in baseline mode by default: it fails only when the count
    # INCREASES above `.lint-dockind-writer-baseline.json`. Count decreases
    # always pass.
    name: DocKind Writer Uniqueness (T10369)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: DocKind Writer Uniqueness gate (baseline mode)
        # Pure static analysis of checked-in source files — no untrusted input.
        run: node scripts/lint-dockind-writer-uniqueness.mjs

  docs-similarity-lint:
    # T10170 / Saga T9855 / Epic E12.C13 — Docs Similarity Lint. Blocks PRs
    # whose new `.md` additions under any canonical doc root (publishMirror
    # or rawMdPaths in `.cleo/canon.yml`) score >= 0.85 cosine similarity
    # against any existing doc.
    #
    # The script scans ONLY the PR diff (`git diff --diff-filter=A
    # <base>...HEAD`), so the legacy corpus is never re-scored — it acts as
    # a forward-only enforcement. Tolerated near-dupes are recorded in
    # `scripts/.lint-docs-similarity-baseline.json` and re-checked on every
    # run; net-add over baseline fails with E_DOC_NEAR_DUPLICATE.
    #
    # Sister gates: T10369 (DocKind writer uniqueness — slug allocation),
    # T10361 (write-time slug-similarity inside `cleo docs add`).
    name: Docs Similarity Lint (T10170)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required so `git diff origin/main...HEAD` resolves
          # both ends — shallow clones drop the base ref's commit.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve PR base ref
        # GHA's `github.base_ref` is unset on pushes; default to `main` so
        # local pushes to feature branches still get scanned.
        run: echo "BASE_REF=origin/${{ github.base_ref || 'main' }}" >> $GITHUB_ENV
      - name: Docs Similarity gate (--check)
        # Pure read of checked-in markdown — no untrusted shell expansion of
        # diff content. The script runs `git diff --diff-filter=A` itself.
        run: node scripts/lint-docs-similarity.mjs --check --base "$BASE_REF"

  manual-write-sweep:
    # T10372 / Epic T10293 / Saga T10288 SG-DOCS-INTEGRITY E5.2 — repo-wide
    # manual-write sweep. Walks every `.md` file added under `.cleo/canon.yml`'s
    # `rawMdPaths` directories since the T9791 docs-import cutoff
    # (commit 251814e86), hashes it, and queries the docs SSoT to classify
    # each file as `in-sync`, `drift`, or `orphan`. Emits a structured JSON
    # report under `audit/manual-write-sweep-<date>.json`.
    #
    # READ-ONLY: the script mutates nothing. Initially wired with
    # `continue-on-error: true` so the existing orphan corpus does not fail
    # CI; flips to strict after Saga T10288 / Epic T10293 E5.3 lands the
    # orphan cleanup migration. The report artefact is uploaded on every
    # run so reviewers can see the unresolved count trend.
    name: Manual Write Sweep (T10372)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git log --diff-filter=A
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Build cleo CLI (sweep shells out to `cleo docs list/fetch`)
        run: pnpm run build
      - name: Run manual-write sweep
        # The script exits 1 when orphans or drift exist — wrap with
        # --allow-unresolved so CI is informational until E5.3 cleans up.
        # --cleo-bin invokes the just-built local CLI bundle.
        run: node scripts/sweep-manual-doc-writes.mjs --allow-unresolved --cleo-bin "node packages/cleo/dist/cli/index.js"
      - name: Upload sweep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: manual-write-sweep
          path: audit/manual-write-sweep-*.json
          if-no-files-found: warn

  canon-drift:
    name: Canon Drift Check
    needs: [biome]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build monorepo (cleo + all workspace deps)
        # Use root build script — pnpm --filter @cleocode/cleo run build alone
        # does NOT build workspace dependencies first, so tsc cannot resolve
        # @cleocode/contracts / @cleocode/core/internal / @cleocode/lafs.
        run: pnpm run build
      - name: Run canon drift gate
        run: node packages/cleo/dist/cli/index.js check canon

  canon-check:
    # T9796 — Docs canon-routing CI gate. Loads `.cleo/canon.yml` and rejects
    # NEW *.md files (git diff --diff-filter=A vs the PR's base ref) that
    # land inside a `rawMdPaths` directory whose owning DocKind has
    # `rawMdAllowed: false`. Existing legacy files (migrated by T9791) are
    # never flagged — the gate only fires on ADDITIONS. Saga T9787.
    name: Canon Drift Check (T9796)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build monorepo (cleo + all workspace deps)
        run: pnpm run build
      - name: Run docs canon gate
        run: |
          # On PRs, diff against the base branch — origin/${{ github.base_ref }}
          # — so non-main PR targets (release branches, stacked PRs, etc.) work.
          # On push events, fall back to origin/main.
          base_ref="origin/${{ github.base_ref || 'main' }}"
          echo "canon-check: diffing against $base_ref"
          node packages/cleo/dist/cli/index.js check canon docs --base "$base_ref"

  docs-drift:
    # T9645: gate published docs SSoT vs the on-disk git files.
    # `cleo docs status` exits 2 when any publication has drifted, 0 when
    # all are in-sync, and is a no-op when no `.cleo/docs-publications.json`
    # exists yet. This job IS the release-verify drift gate.
    name: Docs SSoT Drift Gate (T9645)
    needs: [biome]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Skip when no docs ledger exists
        id: ledger-check
        run: |
          if [[ -f .cleo/docs-publications.json ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No docs-publications.json — gate is a no-op."
          fi
      - run: pnpm install --frozen-lockfile
        if: steps.ledger-check.outputs.exists == 'true'
      - name: Build monorepo (cleo + workspace deps)
        if: steps.ledger-check.outputs.exists == 'true'
        run: pnpm run build
      - name: Run docs drift gate
        if: steps.ledger-check.outputs.exists == 'true'
        run: |
          # `cleo docs status` exits:
          #   0 — every publication in-sync
          #   2 — at least one publication drifted (modified/deleted)
          # Any other non-zero exit is a tool failure and must fail the gate.
          set +e
          node packages/cleo/dist/cli/index.js docs status
          rc=$?
          set -e
          if [ $rc -eq 0 ]; then
            echo "docs-drift: clean."
            exit 0
          fi
          if [ $rc -eq 2 ]; then
            echo "::error::docs SSoT drift detected — published files have diverged from the blob store."
            echo "::error::Run \`cleo docs sync --from <path> --for <ownerId> --name <blobName>\` for each drifted entry, or wait for the docs-reingest workflow after merge."
            exit 2
          fi
          echo "::error::cleo docs status failed with exit $rc"
          exit $rc

  migration-integrity:
    # Guards against the gitignore-silent-block bug that caused the CI
    # regression fixed in c6ae85a3. Before that, a too-broad "migrations/"
    # rule in .gitignore silently excluded new drizzle migration.sql files,
    # leaving CI to run against pre-migration schema. This job fails if any
    # migration.sql on disk is not tracked in git. Uses only static shell
    # commands — no user input flows into run:.
    name: Migration Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify every migration.sql on disk is tracked in git
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Untracked migration file. Run: git add -f $f"
              missing=$((missing + 1))
            fi
          done < <(find packages crates -name 'migration.sql' -not -path '*/node_modules/*' 2>/dev/null)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing migration file(s) on disk are untracked in git."
            echo "::error::The .gitignore rule 'migrations/' used to be too broad — fixed to '/migrations/' in same commit as this check."
            echo "::error::Fix with: git add -f <path>   (one command per untracked file)"
            exit 1
          fi
          echo "All migration.sql files are properly tracked."

  migration-lint:
    # T1168: Enforced RULE-1 gate — migration.sql files must not end with a
    # trailing "--> statement-breakpoint" (signals a truncated migration).
    # WARN-level findings (RULE-3 snapshot chain, RULE-4 flat SQL) are surfaced
    # as ::warning annotations on the PR diff but do not fail the build.
    # Only ERROR-level violations (RULE-1, RULE-2) fail the job.
    # No untrusted input is used in run: commands — GITHUB_ACTIONS is set
    # automatically by the runner, not from any user-controlled expression.
    name: Migration Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Run migration linter (fail on RULE-1 ERRORs)
        # GITHUB_ACTIONS=true is set automatically by the runner; the linter
        # reads it to emit ::error / ::warning inline annotations on PR diffs.
        run: node scripts/lint-migrations.mjs --fail-on=error

  drizzle-kit-check:
    # T1169: Schema consistency gate — uses drizzle-kit check to verify that
    # schema files match their corresponding migration snapshots. Catches schema
    # drift without requiring a full migration run. As of T1175 (after T1165,
    # T1166, and T1176 baseline resets landed), this gate is now blocking —
    # schema drift failures will fail the build and block PRs.
    # See docs/architecture/migrations/schema-consistency.md for details.
    name: Drizzle Kit Schema Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Run drizzle-kit check on all 5 DB configs
        id: schema-check
        run: pnpm db:check

  typecheck:
    name: Type Check
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Type check with project references
        run: pnpm run typecheck

  unit-tests:
    name: Unit Tests (${{ matrix.os }}, shard ${{ matrix.shard }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        # Windows shards temporarily disabled pending T9182/T9181 follow-up — pre-existing
        # afterEach hook hangs on injection-chain + orchestrate-engine + paths tests.
        # Linux + macOS validate cross-platform correctness for v2026.5.50.
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]') }}
        shard: [1, 2]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Build worktree-napi native addon BEFORE pnpm install (T9982)
        # Must run before `pnpm install --frozen-lockfile` so that the file:
        # link to crates/worktree-napi picks up the .node binary into the
        # pnpm-managed copy under node_modules/.pnpm/@cleocode+worktree-napi@*.
        # The crate's package.json declares "files": ["worktree-napi.*.node"]
        # so pnpm only copies in artifacts that exist at install time.
        shell: bash
        run: |
          cargo build --release -p worktree-napi
          case "${{ runner.os }}" in
            Linux)
              triple="linux-x64-gnu"
              if [[ "$(uname -m)" == "aarch64" ]]; then
                triple="linux-arm64-gnu"
              fi
              cp target/release/libworktree_napi.so "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
            macOS)
              triple="darwin-x64"
              if [[ "$(uname -m)" == "arm64" ]]; then
                triple="darwin-arm64"
              fi
              cp target/release/libworktree_napi.dylib "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
            Windows)
              triple="win32-x64-msvc"
              if [[ "${PROCESSOR_ARCHITECTURE:-}" == "ARM64" ]]; then
                triple="win32-arm64-msvc"
              fi
              cp target/release/worktree_napi.dll "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
          esac
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Build cant-napi native addon for CANT tests
        if: runner.os != 'Linux'
        shell: bash
        run: |
          cargo build --release -p cant-napi
          case "${{ runner.os }}" in
            macOS)
              triple="darwin-x64"
              if [[ "$(uname -m)" == "arm64" ]]; then
                triple="darwin-arm64"
              fi
              cp target/release/libcant_napi.dylib "crates/cant-napi/cant-napi.${triple}.node"
              ;;
            Windows)
              triple="win32-x64-msvc"
              if [[ "${PROCESSOR_ARCHITECTURE:-}" == "ARM64" ]]; then
                triple="win32-arm64-msvc"
              fi
              cp target/release/cant_napi.dll "crates/cant-napi/cant-napi.${triple}.node"
              ;;
          esac
      - name: Build packages (required for cross-package imports)
        run: pnpm run build
      - name: Generate SvelteKit type stubs (required for studio tests)
        # packages/studio/tsconfig.json extends .svelte-kit/tsconfig.json which
        # is generated by svelte-kit sync. Previously .svelte-kit/ was tracked in
        # git (inadvertently). After adding it to .gitignore (v2026.4.60), we must
        # generate it explicitly in CI before running tests. No user input used.
        run: pnpm --filter @cleocode/studio exec svelte-kit sync
      - name: Resolve test scope (per-package fast path or full shard sweep)
        # On PRs NOT targeting main with ≤3 packages changed, run only the
        # affected package tests via pnpm test:pkg for faster feedback.
        # Always falls back to the full 2-shard sweep when:
        #   - targeting main (cross-platform matrix already handles this)
        #   - more than 3 packages changed (too broad for per-package scoping)
        #   - the changed-package set is ambiguous (root config files touched)
        # Per-package scoping is an OPTIONAL fast path, NOT a replacement.
        # The shard run is always the safe fallback.
        id: test-scope
        shell: bash
        run: |
          # Targeting main always uses full shard sweep (set by matrix strategy).
          # For non-main PRs, check how many individual packages changed.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "main" ]]; then
            changed_pkgs=""
            [[ "${{ needs.changes.outputs.core }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/core"
            [[ "${{ needs.changes.outputs.cleo }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo"
            [[ "${{ needs.changes.outputs.contracts }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/contracts"
            [[ "${{ needs.changes.outputs.nexus }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/nexus"
            [[ "${{ needs.changes.outputs.studio }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/studio"
            [[ "${{ needs.changes.outputs.adapters }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/adapters"
            [[ "${{ needs.changes.outputs.agents }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/agents"
            [[ "${{ needs.changes.outputs.animations }}"  == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/animations"
            [[ "${{ needs.changes.outputs.brain }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/brain"
            [[ "${{ needs.changes.outputs.caamp }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/caamp"
            [[ "${{ needs.changes.outputs.cant }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cant"
            [[ "${{ needs.changes.outputs.cleo_os }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo-os"
            [[ "${{ needs.changes.outputs.git_shim }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/git-shim"
            [[ "${{ needs.changes.outputs.lafs }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/lafs"
            [[ "${{ needs.changes.outputs.mcp_adapter }}" == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/mcp-adapter"
            [[ "${{ needs.changes.outputs.paths }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/paths"
            [[ "${{ needs.changes.outputs.playbooks }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/playbooks"
            [[ "${{ needs.changes.outputs.runtime }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/runtime"
            [[ "${{ needs.changes.outputs.skills }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/skills"
            [[ "${{ needs.changes.outputs.worktree }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/worktree"
            changed_pkgs="${changed_pkgs# }"  # trim leading space
            pkg_count=$(echo "$changed_pkgs" | wc -w)
            if [[ -n "$changed_pkgs" && "$pkg_count" -le 3 ]]; then
              echo "mode=per_package_tests" >> "$GITHUB_OUTPUT"
              echo "pkgs=$changed_pkgs"     >> "$GITHUB_OUTPUT"
              echo "Per-package fast path: $changed_pkgs ($pkg_count package(s))"
            else
              echo "mode=shard" >> "$GITHUB_OUTPUT"
              echo "pkgs="      >> "$GITHUB_OUTPUT"
              echo "Full shard sweep: $pkg_count package(s) changed (or root config touched)"
            fi
          else
            echo "mode=shard" >> "$GITHUB_OUTPUT"
            echo "pkgs="      >> "$GITHUB_OUTPUT"
            echo "Full shard sweep: targeting main or push event"
          fi
      - name: Run unit tests — per-package fast path (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode == 'per_package_tests' && matrix.shard == 1
        # Only runs on shard 1 to avoid duplicates; per-package scope is
        # already narrow enough that sharding provides no meaningful benefit.
        run: pnpm test:pkg ${{ steps.test-scope.outputs.pkgs }}
      - name: Run unit tests — full shard sweep (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode != 'per_package_tests'
        shell: bash
        run: |
          set -o pipefail
          pnpm exec vitest run --shard=${{ matrix.shard }}/2 2>&1 | tee /tmp/vitest-shard${{ matrix.shard }}.log
      - name: T9170 — schema-warning budget gate (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode != 'per_package_tests' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: node scripts/check-schema-warning-budget.mjs /tmp/vitest-shard${{ matrix.shard }}.log

  build-verify:
    name: Build & Verify (${{ matrix.os }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        # Windows temporarily disabled pending T9182/T9181 follow-up.
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest"]' || '["ubuntu-latest"]') }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ──────────────────────────────────────────────────────────────────
      # COLD-STATE BUILD GATE
      #
      # Purpose: catch workspace-dependency-order regressions in build.mjs
      # at PR-time, never at release-time.
      #
      # Background: in v2026.4.8 the release workflow failed at the Build
      # step because caamp's tsup DTS resolver couldn't find @cleocode/cant
      # — caamp had grown a new import that depended on cant's .d.ts files
      # being present on disk before caamp built, but build.mjs's order had
      # caamp building first. The bug only reproduced from a fully clean
      # state (no dist, no tsbuildinfo) because local re-builds left stale
      # dist files behind that masked the gap.
      #
      # CI checkouts are already fresh, so this defensive `rm -rf` is
      # belt-and-braces — it guarantees the build runs from zero state
      # regardless of any future caching changes to actions/checkout or
      # actions/cache. If someone reorders build.mjs incorrectly again,
      # this step fails and blocks the merge.
      # ──────────────────────────────────────────────────────────────────
      - name: Build worktree-napi native addon BEFORE pnpm install (T9982)
        # Must run before `pnpm install` so the file:link to crates/worktree-napi
        # picks up the .node binary. See ci.yml unit-tests job for context.
        shell: bash
        run: |
          cargo build --release -p worktree-napi
          case "${{ runner.os }}" in
            Linux)
              triple="linux-x64-gnu"
              if [[ "$(uname -m)" == "aarch64" ]]; then
                triple="linux-arm64-gnu"
              fi
              cp target/release/libworktree_napi.so "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
            macOS)
              triple="darwin-x64"
              if [[ "$(uname -m)" == "arm64" ]]; then
                triple="darwin-arm64"
              fi
              cp target/release/libworktree_napi.dylib "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
            Windows)
              triple="win32-x64-msvc"
              if [[ "${PROCESSOR_ARCHITECTURE:-}" == "ARM64" ]]; then
                triple="win32-arm64-msvc"
              fi
              cp target/release/worktree_napi.dll "crates/worktree-napi/worktree-napi.${triple}.node"
              ;;
          esac
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Cold-state cleanup (defense against build-order regressions)
        shell: bash
        run: |
          rm -rf packages/*/dist packages/*/tsconfig.tsbuildinfo
          echo "Cleaned dist and tsbuildinfo from all packages."
      - name: Build all packages from cold state (catches dep-order regressions)
        run: node build.mjs
      - name: Verify core dist exists
        shell: bash
        run: |
          test -f packages/core/dist/index.js || (echo "packages/core/dist/index.js missing" && exit 1)
      - name: Verify lafs dist exists
        shell: bash
        run: |
          test -f packages/lafs/dist/src/index.js || (echo "packages/lafs/dist/src/index.js missing" && exit 1)
      - name: Verify caamp dist exists
        shell: bash
        run: |
          test -f packages/caamp/dist/index.js || (echo "packages/caamp/dist/index.js missing" && exit 1)
      - name: Verify cant dist exists
        shell: bash
        run: |
          test -f packages/cant/dist/index.js || (echo "packages/cant/dist/index.js missing" && exit 1)
      - name: Verify runtime dist exists
        shell: bash
        run: |
          test -f packages/runtime/dist/index.js || (echo "packages/runtime/dist/index.js missing" && exit 1)
      - name: Verify CLI binary
        shell: bash
        run: node packages/cleo/dist/cli/index.js version
      - name: Verify mcp-adapter dist exists
        shell: bash
        run: |
          test -f packages/mcp-adapter/dist/cli.js || (echo "packages/mcp-adapter/dist/cli.js missing — build.mjs did not build @cleocode/mcp-adapter" && exit 1)
      - name: Verify MCP adapter server starts and responds
        if: matrix.os != 'windows-latest'
        shell: bash
        # Real smoke test: pipe a JSON-RPC 2.0 `initialize` request, close
        # stdin, and assert the response carries the expected serverInfo.name.
        # Catches regressions like:
        #   - missing dist (MODULE_NOT_FOUND on cli.js / server.js)
        #   - broken transitive imports (@cleocode/core load failure)
        #   - protocol-handler crashes on initialize
        # Failing exit code FAILS the job — no `|| true` masking.
        run: |
          OUTPUT=$(node -e "const { spawnSync } = require('node:child_process'); const r = spawnSync(process.execPath, ['packages/mcp-adapter/dist/cli.js'], { input: '{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{}}\n', encoding: 'utf8', timeout: 10000 }); process.stdout.write(r.stdout || ''); process.stderr.write(r.stderr || ''); if (r.error) { console.error(r.error.message); process.exit(1); } process.exit(r.status ?? 1);")
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '"name":"cleo-mcp-adapter"' \
            || (echo "MCP adapter did not return expected initialize response" && exit 1)

  validate-json:
    name: Validate JSON Schemas
    needs: [biome, changes]
    if: needs.changes.outputs.schemas == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Validate JSON schema files
        run: |
          find packages -name '*.json' -path '*/schemas/*' | while read file; do
            echo "Validating: $file"
            jq empty "$file"
          done

  install-test:
    name: Install Test
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Build worktree-napi native addon BEFORE pnpm install (T9982)
        shell: bash
        run: |
          cargo build --release -p worktree-napi
          cp target/release/libworktree_napi.so crates/worktree-napi/worktree-napi.linux-x64-gnu.node
      - name: Install dependencies and build
        run: pnpm install --frozen-lockfile && node build.mjs
      - name: Test global link (simulates global install)
        run: |
          cd packages/cleo && pnpm link --global && cd ../..
          cleo version
          cleo --help
      - name: Test MCP server flag
        run: timeout 5 cleo --mcp-server 2>&1 || true
      - name: Test project initialization
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          cleo init test-project
          ls -la .cleo/
      - name: Cleanup
        if: always()
        run: pnpm unlink --global @cleocode/cleo

  forge-ts-check:
    name: Documentation Coverage (forge-ts)
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        uses: ./.github/actions/install-ripgrep
      - name: Check TSDoc coverage
        run: pnpm exec forge-ts check --human || true
      - name: Build documentation
        run: pnpm exec forge-ts build || true
