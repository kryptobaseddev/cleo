name: Envelope Compliance Lint
# @task T11027 — Verifies project move/rename/re-register output uses RenderableEnvelope per T10346.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  lint:
    name: "Envelope Compliance (T11027)"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/lint-envelope-compliance.mjs
