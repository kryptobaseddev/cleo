name: Lockfile Check

# @task T10102
# Standalone fast-fail gate that runs `pnpm install --frozen-lockfile`
# before any other CI job. Predates the task-annotation convention; T10102
# (workflow inventory) classifies this as a defensible singleton.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

jobs:
  lockfile-consistency:
    name: Verify pnpm-lock.yaml consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Run frozen-lockfile check
        run: pnpm install --frozen-lockfile
        continue-on-error: false
