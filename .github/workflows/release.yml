name: Release

# Triggers:
#   1. Automatic: push a v* tag (e.g. v2026.3.14, v2026.3.14-beta.1)
#   2. Manual break-glass: workflow_dispatch with a version input
#      (use if the tag push triggered a failed run that needs a retry)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2026.3.14). Tag must already exist on main.'
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # Resolve version from tag push or manual workflow_dispatch input
      - name: Get version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          # Determine npm dist-tag from version suffix
          if [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-dev"* ]]; then
            DIST_TAG="dev"
          elif [[ "$VERSION" == *"-beta"* ]] || [[ "$VERSION" == *"-rc"* ]]; then
            DIST_TAG="beta"
          else
            DIST_TAG="latest"
          fi
          IS_PRERELEASE=$([[ "$VERSION" == *"-"* ]] && echo "true" || echo "false")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION | dist-tag: $DIST_TAG | prerelease: $IS_PRERELEASE"

      # CalVer validation: YYYY.M.PATCH (stable) or YYYY.M.PATCH-suffix (pre-release)
      - name: Validate CalVer
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BASE_VERSION="${VERSION%%-*}"
          TAG_YEAR="${BASE_VERSION%%.*}"
          TAG_MONTH="${BASE_VERSION#*.}"; TAG_MONTH="${TAG_MONTH%%.*}"
          CURRENT_YEAR=$(date -u +%Y)
          CURRENT_MONTH=$(date -u +%-m)
          NEXT_MONTH=$(( CURRENT_MONTH == 12 ? 1 : CURRENT_MONTH + 1 ))
          NEXT_YEAR=$(( CURRENT_MONTH == 12 ? CURRENT_YEAR + 1 : CURRENT_YEAR ))

          if [[ "$VERSION" == *"-"* ]]; then
            # Pre-release: allow current or next month
            if [[ "$TAG_YEAR" != "$CURRENT_YEAR" && "$TAG_YEAR" != "$NEXT_YEAR" ]] || \
               [[ "$TAG_MONTH" != "$CURRENT_MONTH" && "$TAG_MONTH" != "$NEXT_MONTH" ]]; then
              echo "ERROR: Pre-release $VERSION outside allowed CalVer range"
              exit 1
            fi
            echo "CalVer OK (pre-release): $VERSION"
          else
            # Stable: strict current month required
            if [[ "$TAG_YEAR" != "$CURRENT_YEAR" || "$TAG_MONTH" != "$CURRENT_MONTH" ]]; then
              echo "ERROR: $VERSION does not match current CalVer ${CURRENT_YEAR}.${CURRENT_MONTH}"
              exit 1
            fi
            echo "CalVer OK (stable): $VERSION"
          fi

      # Sync package.json version from tag — prevents "cannot publish over previously published" errors
      # when a developer forgets to bump package.json before pushing the tag.
      - name: Sync package.json version from tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' package.json > package.tmp && mv package.tmp package.json
          echo "package.json version synced to $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate build output
        run: |
          for path in dist/cli/index.js dist/mcp/index.js schemas templates packages/ct-skills/skills; do
            [[ -e "$path" ]] || { echo "ERROR: Missing required artifact: $path"; exit 1; }
          done
          echo "All build artifacts present"

      # ── GitHub Release ────────────────────────────────────────────────────────

      - name: Build release tarball and checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p "staging/cleo-${VERSION}"
          cp -r dist schemas templates package.json LICENSE README.md install.sh "staging/cleo-${VERSION}/"
          cp -r packages/ct-skills/skills "staging/cleo-${VERSION}/"
          [[ -d completions ]] && cp -r completions "staging/cleo-${VERSION}/" || true
          [[ -f VERSION ]] && cp VERSION "staging/cleo-${VERSION}/" || true
          chmod +x "staging/cleo-${VERSION}/dist/cli/index.js" \
                   "staging/cleo-${VERSION}/dist/mcp/index.js" \
                   "staging/cleo-${VERSION}/install.sh"
          tar -czf "cleo-${VERSION}.tar.gz" -C staging "cleo-${VERSION}"
          sha256sum "cleo-${VERSION}.tar.gz" install.sh > SHA256SUMS
          echo "Tarball size: $(ls -lh cleo-${VERSION}.tar.gz | awk '{print $5}')"
          cat SHA256SUMS

      - name: Generate release notes from CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2 > release-notes.txt
            echo "Source: CHANGELOG.md"
          else
            echo "### Changes" > release-notes.txt
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [[ -n "$PREV_TAG" ]]; then
              git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD" >> release-notes.txt
            else
              git log --pretty=format:"- %s" --no-merges -20 >> release-notes.txt
            fi
            echo "Source: git log"
          fi
          cat release-notes.txt

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          # Delete any existing release for this tag (keeps the tag itself)
          # This makes the step idempotent — safe to re-run on workflow retries
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          PRERELEASE_FLAG=""
          [[ "$IS_PRERELEASE" == "true" ]] && PRERELEASE_FLAG="--prerelease"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-notes.txt \
            $PRERELEASE_FLAG \
            "cleo-${VERSION}.tar.gz" \
            install.sh \
            SHA256SUMS
          echo "GitHub release v${VERSION} published"

      # ── CHANGELOG gate ────────────────────────────────────────────────────────

      - name: Verify CHANGELOG section
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "ERROR: CHANGELOG.md does not contain a section for version ${VERSION}"
            echo "Expected to find: ## [${VERSION}]"
            echo "Run the release.ship operation locally before pushing the tag."
            exit 1
          fi
          echo "CHANGELOG section verified for v${VERSION}"

      # ── npm Publish (OIDC Trusted Publishing via release.yml) ─────────────────

      - name: Publish to npm
        run: npm publish --tag ${{ steps.version.outputs.dist_tag }} --access public

      # ── MCP Registry Publish ──────────────────────────────────────────────────

      - name: Update server.json version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Publish to MCP Registry
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
