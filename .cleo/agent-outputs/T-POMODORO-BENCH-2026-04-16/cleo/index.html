<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>Pomodoro Todos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <header class="app-header" role="banner">
    <h1 class="app-title">CLEO + Pomodoro Todo</h1>
    <div class="header-actions">
      <button id="theme-toggle" class="icon-btn" aria-label="Toggle color theme" aria-pressed="false">
        <span aria-hidden="true" class="theme-icon">&#9681;</span>
      </button>
      <button id="settings-toggle" class="icon-btn" aria-label="Open settings" aria-expanded="false" aria-controls="settings-panel">
        <span aria-hidden="true">&#9881;</span>
      </button>
    </div>
  </header>

  <main id="main" class="app-main" role="main">
    <section class="timer-section" aria-labelledby="timer-heading">
      <h2 id="timer-heading" class="sr-only">Pomodoro timer</h2>

      <div class="timer-card">
        <div class="timer-ring-wrap" role="img" aria-labelledby="timer-phase timer-display">
          <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="ring-track" cx="100" cy="100" r="90"></circle>
            <circle id="ring-progress" class="ring-progress" cx="100" cy="100" r="90"
                    stroke-dasharray="565.48" stroke-dashoffset="0"
                    transform="rotate(-90 100 100)"></circle>
          </svg>
          <div class="timer-overlay">
            <div id="timer-phase" class="timer-phase" aria-live="polite">Work</div>
            <div id="timer-display" class="timer-display" aria-live="off">25:00</div>
            <div id="timer-cycle" class="timer-cycle">Cycle 1 of 4</div>
          </div>
        </div>

        <div class="timer-controls" role="group" aria-label="Timer controls">
          <button id="btn-start" class="btn btn-primary" aria-keyshortcuts="Space">Start</button>
          <button id="btn-reset" class="btn" aria-label="Reset timer">Reset</button>
          <button id="btn-skip" class="btn" aria-label="Skip to next phase">Skip</button>
        </div>

        <div class="current-todo" aria-live="polite">
          <span class="label">Focused:</span>
          <span id="current-todo-title">(none selected)</span>
        </div>

        <div class="counters">
          <span>Today: <strong id="daily-count">0</strong></span>
        </div>
      </div>
    </section>

    <section class="todos-section" aria-labelledby="todos-heading">
      <h2 id="todos-heading">Tasks</h2>

      <form id="todo-form" class="todo-form" role="search">
        <label for="new-todo" class="sr-only">New task title</label>
        <input id="new-todo" type="text" placeholder="What do you want to focus on? (N)"
               autocomplete="off" aria-keyshortcuts="N" maxlength="200">
        <button type="submit" class="btn btn-primary">Add</button>
      </form>

      <ul id="todo-list" class="todo-list" role="list" aria-label="Task list"></ul>

      <p id="empty-state" class="empty-state" hidden>No tasks yet. Add one above.</p>
    </section>
  </main>

  <aside id="settings-panel" class="settings-panel" aria-labelledby="settings-heading" hidden>
    <h2 id="settings-heading">Settings</h2>
    <form id="settings-form" class="settings-form">
      <label>
        <span>Work (minutes)</span>
        <input type="number" id="opt-work" name="work" min="1" max="120" step="1" value="25">
      </label>
      <label>
        <span>Short break (minutes)</span>
        <input type="number" id="opt-short" name="short" min="1" max="60" step="1" value="5">
      </label>
      <label>
        <span>Long break (minutes)</span>
        <input type="number" id="opt-long" name="long" min="1" max="60" step="1" value="15">
      </label>
      <label>
        <span>Long break every N cycles</span>
        <input type="number" id="opt-cadence" name="cadence" min="2" max="12" step="1" value="4">
      </label>
      <div class="settings-actions">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" id="settings-close" class="btn">Close</button>
      </div>
    </form>
  </aside>

  <div id="live-region" class="sr-only" aria-live="polite" role="status"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
