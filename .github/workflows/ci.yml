name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
      schemas: ${{ steps.filter.outputs.schemas }}
      core: ${{ steps.filter.outputs.core }}
      cleo: ${{ steps.filter.outputs.cleo }}
      contracts: ${{ steps.filter.outputs.contracts }}
      nexus: ${{ steps.filter.outputs.nexus }}
      studio: ${{ steps.filter.outputs.studio }}
      adapters: ${{ steps.filter.outputs.adapters }}
      agents: ${{ steps.filter.outputs.agents }}
      animations: ${{ steps.filter.outputs.animations }}
      brain: ${{ steps.filter.outputs.brain }}
      caamp: ${{ steps.filter.outputs.caamp }}
      cant: ${{ steps.filter.outputs.cant }}
      cleo_os: ${{ steps.filter.outputs.cleo_os }}
      git_shim: ${{ steps.filter.outputs.git_shim }}
      lafs: ${{ steps.filter.outputs.lafs }}
      mcp_adapter: ${{ steps.filter.outputs.mcp_adapter }}
      paths: ${{ steps.filter.outputs.paths }}
      playbooks: ${{ steps.filter.outputs.playbooks }}
      runtime: ${{ steps.filter.outputs.runtime }}
      skills: ${{ steps.filter.outputs.skills }}
      worktree: ${{ steps.filter.outputs.worktree }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'packages/**'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vitest.config.ts'
              - 'build.mjs'
            schemas:
              - 'packages/*/schemas/**'
              - 'packages/*/templates/**'
            core:
              - 'packages/core/**'
            cleo:
              - 'packages/cleo/**'
            contracts:
              - 'packages/contracts/**'
            nexus:
              - 'packages/nexus/**'
            studio:
              - 'packages/studio/**'
            adapters:
              - 'packages/adapters/**'
            agents:
              - 'packages/agents/**'
            animations:
              - 'packages/animations/**'
            brain:
              - 'packages/brain/**'
            caamp:
              - 'packages/caamp/**'
            cant:
              - 'packages/cant/**'
            cleo_os:
              - 'packages/cleo-os/**'
            git_shim:
              - 'packages/git-shim/**'
            lafs:
              - 'packages/lafs/**'
            mcp_adapter:
              - 'packages/mcp-adapter/**'
            paths:
              - 'packages/paths/**'
            playbooks:
              - 'packages/playbooks/**'
            runtime:
              - 'packages/runtime/**'
            skills:
              - 'packages/skills/**'
            worktree:
              - 'packages/worktree/**'

  biome:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: biomejs/setup-biome@v2
        with:
          version: '2.4.8'
      - run: biome ci .

  agent-outputs-registration:
    # T1617: Require every .md added to .cleo/agent-outputs/ to be registered
    # via (a) cleo docs add, (b) cleo memory observe, or (c) @no-cleo-register
    # marker in frontmatter. Prevents markdown debt accumulation.
    # Only newly added .md files are checked (git diff --diff-filter=A vs main).
    # No untrusted input used — pure static analysis of checked-in source files.
    name: Agent-Outputs Registration Lint (T1617)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint agent-outputs registration
        run: node scripts/lint-agent-outputs-registration.mjs --since origin/main --severity error

  ssot-lint:
    name: Contracts/Core SSoT (ADR-057)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Lint Contracts/Core SSoT (ADR-057)
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-core-ssot.mjs --exit-on-fail

  contracts-dep-lint:
    name: Contracts Dep Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enforce contracts dep declarations
        # No untrusted input used — pure static analysis of checked-in source files.
        run: node scripts/lint-contracts-dep.mjs

  canon-drift:
    name: Canon Drift Check
    needs: [biome]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Build monorepo (cleo + all workspace deps)
        # Use root build script — pnpm --filter @cleocode/cleo run build alone
        # does NOT build workspace dependencies first, so tsc cannot resolve
        # @cleocode/contracts / @cleocode/core/internal / @cleocode/lafs.
        run: pnpm run build
      - name: Run canon drift gate
        run: node packages/cleo/dist/cli/index.js check canon

  migration-integrity:
    # Guards against the gitignore-silent-block bug that caused the CI
    # regression fixed in c6ae85a3. Before that, a too-broad "migrations/"
    # rule in .gitignore silently excluded new drizzle migration.sql files,
    # leaving CI to run against pre-migration schema. This job fails if any
    # migration.sql on disk is not tracked in git. Uses only static shell
    # commands — no user input flows into run:.
    name: Migration Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify every migration.sql on disk is tracked in git
        run: |
          set -e
          missing=0
          while IFS= read -r f; do
            if ! git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              echo "::error file=$f::Untracked migration file. Run: git add -f $f"
              missing=$((missing + 1))
            fi
          done < <(find packages crates -name 'migration.sql' -not -path '*/node_modules/*' 2>/dev/null)
          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing migration file(s) on disk are untracked in git."
            echo "::error::The .gitignore rule 'migrations/' used to be too broad — fixed to '/migrations/' in same commit as this check."
            echo "::error::Fix with: git add -f <path>   (one command per untracked file)"
            exit 1
          fi
          echo "All migration.sql files are properly tracked."

  migration-lint:
    # T1168: Enforced RULE-1 gate — migration.sql files must not end with a
    # trailing "--> statement-breakpoint" (signals a truncated migration).
    # WARN-level findings (RULE-3 snapshot chain, RULE-4 flat SQL) are surfaced
    # as ::warning annotations on the PR diff but do not fail the build.
    # Only ERROR-level violations (RULE-1, RULE-2) fail the job.
    # No untrusted input is used in run: commands — GITHUB_ACTIONS is set
    # automatically by the runner, not from any user-controlled expression.
    name: Migration Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run migration linter (fail on RULE-1 ERRORs)
        # GITHUB_ACTIONS=true is set automatically by the runner; the linter
        # reads it to emit ::error / ::warning inline annotations on PR diffs.
        run: node scripts/lint-migrations.mjs --fail-on=error

  drizzle-kit-check:
    # T1169: Schema consistency gate — uses drizzle-kit check to verify that
    # schema files match their corresponding migration snapshots. Catches schema
    # drift without requiring a full migration run. As of T1175 (after T1165,
    # T1166, and T1176 baseline resets landed), this gate is now blocking —
    # schema drift failures will fail the build and block PRs.
    # See docs/architecture/migrations/schema-consistency.md for details.
    name: Drizzle Kit Schema Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run drizzle-kit check on all 5 DB configs
        id: schema-check
        run: pnpm db:check

  typecheck:
    name: Type Check
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Type check with project references
        run: pnpm run typecheck

  unit-tests:
    name: Unit Tests (${{ matrix.os }}, shard ${{ matrix.shard }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]') }}
        shard: [1, 2]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Build packages (required for cross-package imports)
        run: pnpm run build
      - name: Generate SvelteKit type stubs (required for studio tests)
        # packages/studio/tsconfig.json extends .svelte-kit/tsconfig.json which
        # is generated by svelte-kit sync. Previously .svelte-kit/ was tracked in
        # git (inadvertently). After adding it to .gitignore (v2026.4.60), we must
        # generate it explicitly in CI before running tests. No user input used.
        run: pnpm --filter @cleocode/studio exec svelte-kit sync
      - name: Resolve test scope (per-package fast path or full shard sweep)
        # On PRs NOT targeting main with ≤3 packages changed, run only the
        # affected package tests via pnpm test:pkg for faster feedback.
        # Always falls back to the full 2-shard sweep when:
        #   - targeting main (cross-platform matrix already handles this)
        #   - more than 3 packages changed (too broad for per-package scoping)
        #   - the changed-package set is ambiguous (root config files touched)
        # Per-package scoping is an OPTIONAL fast path, NOT a replacement.
        # The shard run is always the safe fallback.
        id: test-scope
        shell: bash
        run: |
          # Targeting main always uses full shard sweep (set by matrix strategy).
          # For non-main PRs, check how many individual packages changed.
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" != "main" ]]; then
            changed_pkgs=""
            [[ "${{ needs.changes.outputs.core }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/core"
            [[ "${{ needs.changes.outputs.cleo }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo"
            [[ "${{ needs.changes.outputs.contracts }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/contracts"
            [[ "${{ needs.changes.outputs.nexus }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/nexus"
            [[ "${{ needs.changes.outputs.studio }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/studio"
            [[ "${{ needs.changes.outputs.adapters }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/adapters"
            [[ "${{ needs.changes.outputs.agents }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/agents"
            [[ "${{ needs.changes.outputs.animations }}"  == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/animations"
            [[ "${{ needs.changes.outputs.brain }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/brain"
            [[ "${{ needs.changes.outputs.caamp }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/caamp"
            [[ "${{ needs.changes.outputs.cant }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cant"
            [[ "${{ needs.changes.outputs.cleo_os }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/cleo-os"
            [[ "${{ needs.changes.outputs.git_shim }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/git-shim"
            [[ "${{ needs.changes.outputs.lafs }}"        == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/lafs"
            [[ "${{ needs.changes.outputs.mcp_adapter }}" == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/mcp-adapter"
            [[ "${{ needs.changes.outputs.paths }}"       == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/paths"
            [[ "${{ needs.changes.outputs.playbooks }}"   == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/playbooks"
            [[ "${{ needs.changes.outputs.runtime }}"     == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/runtime"
            [[ "${{ needs.changes.outputs.skills }}"      == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/skills"
            [[ "${{ needs.changes.outputs.worktree }}"    == "true" ]] && changed_pkgs="$changed_pkgs @cleocode/worktree"
            changed_pkgs="${changed_pkgs# }"  # trim leading space
            pkg_count=$(echo "$changed_pkgs" | wc -w)
            if [[ -n "$changed_pkgs" && "$pkg_count" -le 3 ]]; then
              echo "mode=per_package_tests" >> "$GITHUB_OUTPUT"
              echo "pkgs=$changed_pkgs"     >> "$GITHUB_OUTPUT"
              echo "Per-package fast path: $changed_pkgs ($pkg_count package(s))"
            else
              echo "mode=shard" >> "$GITHUB_OUTPUT"
              echo "pkgs="      >> "$GITHUB_OUTPUT"
              echo "Full shard sweep: $pkg_count package(s) changed (or root config touched)"
            fi
          else
            echo "mode=shard" >> "$GITHUB_OUTPUT"
            echo "pkgs="      >> "$GITHUB_OUTPUT"
            echo "Full shard sweep: targeting main or push event"
          fi
      - name: Run unit tests — per-package fast path (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode == 'per_package_tests' && matrix.shard == 1
        # Only runs on shard 1 to avoid duplicates; per-package scope is
        # already narrow enough that sharding provides no meaningful benefit.
        run: pnpm test:pkg ${{ steps.test-scope.outputs.pkgs }}
      - name: Run unit tests — full shard sweep (shard ${{ matrix.shard }}/2)
        if: steps.test-scope.outputs.mode != 'per_package_tests'
        run: pnpm exec vitest run --shard=${{ matrix.shard }}/2

  build-verify:
    name: Build & Verify (${{ matrix.os }})
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: ${{ fromJson(github.event_name == 'pull_request' && github.base_ref == 'main' && '["ubuntu-latest","macos-latest","windows-latest"]' || '["ubuntu-latest"]') }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ──────────────────────────────────────────────────────────────────
      # COLD-STATE BUILD GATE
      #
      # Purpose: catch workspace-dependency-order regressions in build.mjs
      # at PR-time, never at release-time.
      #
      # Background: in v2026.4.8 the release workflow failed at the Build
      # step because caamp's tsup DTS resolver couldn't find @cleocode/cant
      # — caamp had grown a new import that depended on cant's .d.ts files
      # being present on disk before caamp built, but build.mjs's order had
      # caamp building first. The bug only reproduced from a fully clean
      # state (no dist, no tsbuildinfo) because local re-builds left stale
      # dist files behind that masked the gap.
      #
      # CI checkouts are already fresh, so this defensive `rm -rf` is
      # belt-and-braces — it guarantees the build runs from zero state
      # regardless of any future caching changes to actions/checkout or
      # actions/cache. If someone reorders build.mjs incorrectly again,
      # this step fails and blocks the merge.
      # ──────────────────────────────────────────────────────────────────
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Cold-state cleanup (defense against build-order regressions)
        shell: bash
        run: |
          rm -rf packages/*/dist packages/*/tsconfig.tsbuildinfo
          echo "Cleaned dist and tsbuildinfo from all packages."
      - name: Build all packages from cold state (catches dep-order regressions)
        run: node build.mjs
      - name: Verify core dist exists
        shell: bash
        run: |
          test -f packages/core/dist/index.js || (echo "packages/core/dist/index.js missing" && exit 1)
      - name: Verify lafs dist exists
        shell: bash
        run: |
          test -f packages/lafs/dist/src/index.js || (echo "packages/lafs/dist/src/index.js missing" && exit 1)
      - name: Verify caamp dist exists
        shell: bash
        run: |
          test -f packages/caamp/dist/index.js || (echo "packages/caamp/dist/index.js missing" && exit 1)
      - name: Verify cant dist exists
        shell: bash
        run: |
          test -f packages/cant/dist/index.js || (echo "packages/cant/dist/index.js missing" && exit 1)
      - name: Verify runtime dist exists
        shell: bash
        run: |
          test -f packages/runtime/dist/index.js || (echo "packages/runtime/dist/index.js missing" && exit 1)
      - name: Verify CLI binary
        shell: bash
        run: node packages/cleo/dist/cli/index.js version
      - name: Verify mcp-adapter dist exists
        shell: bash
        run: |
          test -f packages/mcp-adapter/dist/cli.js || (echo "packages/mcp-adapter/dist/cli.js missing — build.mjs did not build @cleocode/mcp-adapter" && exit 1)
      - name: Verify MCP adapter server starts and responds
        if: matrix.os != 'windows-latest'
        shell: bash
        # Real smoke test: pipe a JSON-RPC 2.0 `initialize` request, close
        # stdin, and assert the response carries the expected serverInfo.name.
        # Catches regressions like:
        #   - missing dist (MODULE_NOT_FOUND on cli.js / server.js)
        #   - broken transitive imports (@cleocode/core load failure)
        #   - protocol-handler crashes on initialize
        # Failing exit code FAILS the job — no `|| true` masking.
        run: |
          OUTPUT=$(echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}' \
            | timeout 10 node packages/mcp-adapter/dist/cli.js)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q '"name":"cleo-mcp-adapter"' \
            || (echo "MCP adapter did not return expected initialize response" && exit 1)

  validate-json:
    name: Validate JSON Schemas
    needs: [biome, changes]
    if: needs.changes.outputs.schemas == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Validate JSON schema files
        run: |
          find packages -name '*.json' -path '*/schemas/*' | while read file; do
            echo "Validating: $file"
            jq empty "$file"
          done

  install-test:
    name: Install Test
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies and build
        run: pnpm install --frozen-lockfile && node build.mjs
      - name: Test global link (simulates global install)
        run: |
          cd packages/cleo && pnpm link --global && cd ../..
          cleo version
          cleo --help
      - name: Test MCP server flag
        run: timeout 5 cleo --mcp-server 2>&1 || true
      - name: Test project initialization
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          cleo init test-project
          ls -la .cleo/
      - name: Cleanup
        if: always()
        run: pnpm unlink --global @cleocode/cleo

  forge-ts-check:
    name: Documentation Coverage (forge-ts)
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Install ripgrep (required for T1605 callsite-coverage validator)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Check TSDoc coverage
        run: pnpm exec forge-ts check --human || true
      - name: Build documentation
        run: pnpm exec forge-ts build || true

  nexus-bench:
    # T1845: Reproducible benchmark gate — runs cleo-nexus vs gitnexus against
    # internal fixtures and checks for regressions vs the checked-in baseline
    # (scripts/bench/nexus-baseline.json). Triggers only when nexus packages or
    # the bench script itself change. Marked continue-on-error because gitnexus
    # is an external tool not available in the standard CI image; failures are
    # surfaced as annotations rather than blocking the build.
    # No untrusted input used — reads only checked-in fixture files.
    name: Nexus Benchmark (T1845)
    needs: [biome, changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.0'
          run_install: false
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - run: pnpm install --frozen-lockfile
      - name: Build packages (required for cleo nexus analyze)
        run: pnpm run build
      - name: Install gitnexus (best-effort)
        run: npm install -g gitnexus || true
      - name: Run nexus benchmark against internal fixtures
        # BENCH_FIXTURE_PATH is set to the checked-in fixtures dir (4 source files).
        # BENCH_NO_BASELINE=1 skips regression check in CI where baseline fixture
        # SHA may differ from the developer machine that generated the baseline.
        # Regression checks are intended for local runs where openclaw is available.
        run: BENCH_FIXTURE_PATH=packages/nexus/src/__tests__/fixtures BENCH_NO_BASELINE=1 node scripts/bench/nexus-vs-gitnexus.mjs
